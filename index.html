        // AI Client - Smart conversational AI
        const aiClient = {
            async chat(apiKey, messages) {
                const lastMsg = messages[messages.length - 1].content;
                const lower = lastMsg.toLowerCase();
                await new Promise(r => setTimeout(r, 300 + Math.random() * 500));
                
                const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
                
                // Side effects
                if (/side effect/i.test(lastMsg)) {
                    const meds = lastMsg.match(/ibuprofen|aspirin|paracetamol|acetaminophen|metformin|lisinopril|amlodipine|omeprazole|atorvastatin|levothyroxine|metoprolol|gabapentin|sertraline|escitalopram|losartan/i);
                    if (meds) {
                        const m = meds[0].toLowerCase();
                        if (m === 'ibuprofen') return pick([
                            "Ibuprofen side effects can include stomach upset, nausea, dizziness, and headache. Taking it with food can help reduce stomach issues. In rare cases, it may cause stomach ulcers or kidney problems with long-term use.",
                            "Common side effects of ibuprofen: upset stomach, heartburn, drowsiness, or mild headache. If you experience severe stomach pain, blood in stool, or difficulty breathing, seek medical help.",
                            "Ibuprofen is an NSAID. Side effects may include nausea, indigestion, or dizziness. It can also increase blood pressure in some people. Always take with food and stay hydrated."
                        ]);
                        if (m === 'aspirin') return pick([
                            "Aspirin can cause stomach irritation, easy bruising, and bleeding. Some people also experience ringing in the ears. If you're on blood thinners, be extra careful and discuss with your doctor.",
                            "Side effects of aspirin include stomach discomfort, heartburn, and nausea. Low-dose aspirin for heart health is generally well-tolerated, but watch for unusual bruising or bleeding."
                        ]);
                        if (m === 'metformin') return pick([
                            "Metformin side effects often include nausea, stomach cramps, and diarrhea - usually temporary. Taking it with meals helps. Rarely, it can cause vitamin B12 deficiency or lactic acidosis.",
                            "Common metformin effects: digestive issues like nausea, diarrhea, and loss of appetite. These usually improve over time. Long-term use may require monitoring of B12 levels."
                        ]);
                    }
                    return pick([
                        "Side effects depend on the specific medication. Common ones include nausea, dizziness, headache, or drowsiness. Severe reactions like difficulty breathing or swelling need immediate medical attention.",
                        "Most medications can cause side effects. Common ones are mild (nausea, dizziness) but serious ones need prompt medical attention. Always read the information that comes with your prescription.",
                        "Side effects vary by medication. Some are temporary and go away as your body adjusts. Others may need medical attention. When starting a new medication, pay attention to how you feel."
                    ]);
                }
                
                // Storage
                if (/store|keep|shelf.life|expire|temperature|humid/i.test(lastMsg)) {
                    return pick([
                        "Store medications at room temperature (68-77°F) unless directed otherwise. Keep them away from moisture, heat, and direct sunlight. Bathrooms can be too humid. Always keep in original containers.",
                        "Most meds should be stored in a cool, dry place. Avoid the bathroom due to humidity. Some medications need refrigeration. Check labels and keep all drugs away from children and pets.",
                        "Proper storage keeps medications effective. Room temperature, away from moisture and heat is best. Never use expired medications - they may not work and could be harmful."
                    ]);
                }
                
                // Missed dose
                if (/miss|forgot|skip|forget/i.test(lastMsg)) {
                    return pick([
                        "If you miss a dose: take it when you remember, unless it's almost time for your next dose. Then skip it and continue as normal. Never double up - that can be dangerous.",
                        "Take the missed dose if you remember within a few hours. If it's close to your next scheduled dose, skip it. Don't take extra to make up for it. Set phone reminders to help remember.",
                        "What to do depends on the medication. For most: take it if you remember soon, skip if it's almost time for the next dose. Some medications have specific instructions - check with your pharmacist."
                    ]);
                }
                
                // Alcohol
                if (/alcohol|drink|wine|beer/i.test(lastMsg)) {
                    return pick([
                        "Mixing alcohol with medications can be risky. It may increase side effects like drowsiness, cause dangerous reactions, or make the medication less effective. Ask your doctor about your specific meds.",
                        "Alcohol can interact with many drugs - some combinations are dangerous. It may increase drowsiness, affect liver processing, or reduce effectiveness. When in doubt, avoid or limit alcohol.",
                        "Many medications warn against alcohol. It can amplify side effects, interfere with how drugs work, or cause unexpected reactions. Your pharmacist can tell you about your specific medications."
                    ]);
                }
                
                // General questions
                if (/^(hi|hello|hey)/.test(lower)) {
                    return "Hi there! I can answer questions about medications, side effects, interactions, storage, and general health. What would you like to know?";
                }
                
                if (/how are you|how do you do/.test(lower)) {
                    return "I'm here and ready to help! Ask me anything about medications or your health.";
                }
                
                if (/thank|thanks/.test(lower)) {
                    return "You're welcome! Take care of yourself.";
                }
                
                if (/help|capabilities|what can you do/i.test(lastMsg)) {
                    return "I can help with:\n• Medication information & side effects\n• Dosage and timing advice\n• Drug interactions\n• Storage tips\n• What to do if you miss a dose\n• General health questions\n\nJust ask!";
                }
                
                // Dosage
                if (/dosage|dose|how much|how many/i.test(lastMsg)) {
                    return "Dosage depends on your condition, age, weight, and other factors. Always follow the prescription label or your doctor's instructions. Never adjust your dose without consulting them first.";
                }
                
                // Interactions
                if (/interact|cross|conflict|with.*other/i.test(lastMsg)) {
                    return "Drug interactions can change how medications work or increase side effects. Always tell your doctor about ALL medications you're taking, including supplements and over-the-counter drugs.";
                }
                
                // Generic
                if (/generic|brand.name/i.test(lastMsg)) {
                    return "Generic medications are just as safe and effective as brand names but usually cost less. They contain the same active ingredients and must meet the same standards.";
                }
                
                // Pregnancy
                if (/pregnant|pregnancy|baby|child/i.test(lastMsg)) {
                    return "Always consult your doctor about medications during pregnancy or for children. Some medications are safe, others aren't. Never stop prescribed medication without medical advice.";
                }
                
                // Over the counter
                if (/over the counter|otc|without prescription/i.test(lastMsg)) {
                    return "Over-the-counter doesn't mean risk-free. Always read labels, check for interactions with your other medications, and ask the pharmacist if you're unsure.";
                }
                
                // Supplements
                if (/vitamin|supplement|herbal|natural/i.test(lastMsg)) {
                    return "Supplements can interact with prescription medications. Some can increase effects (risking overdose) or decrease them. Tell your doctor about all supplements you're taking.";
                }
                
                // Antibiotics
                if (/antibiotic|antibacterial|bacteria|infection/i.test(lastMsg)) {
                    return "Antibiotics treat bacterial infections, not viruses like colds or flu. Always finish the full course even if you feel better. Never save or share antibiotics.";
                }
                
                // Pain
                if (/pain|headache|migraine|back pain/i.test(lastMsg)) {
                    return "For mild pain, options include acetaminophen, ibuprofen, or naproxen. Each has different considerations. For severe or chronic pain, see your doctor to find the right approach.";
                }
                
                // Blood pressure
                if (/blood pressure|hypertension|high bp/i.test(lastMsg)) {
                    return "High blood pressure often has no symptoms. Medications like lisinopril or amlodipine can help, along with diet changes and exercise. Regular monitoring is important.";
                }
                
                // Diabetes
                if (/blood sugar|diabetes|glucose|insulin/i.test(lastMsg)) {
                    return "Managing diabetes involves medication, diet, and exercise. Metformin is common for type 2 diabetes. Monitor your blood sugar as directed and attend regular check-ups.";
                }
                
                // Thyroid
                if (/thyroid|hypothyroid|hyperthyroid|levothyroxine/i.test(lastMsg)) {
                    return "Thyroid medications like levothyroxine are usually taken on an empty stomach in the morning. Take it consistently at the same time daily and wait before eating or taking other meds.";
                }
                
                // Morning vs evening
                if (/morning|evening|night|bedtime|before|after.*eat/i.test(lastMsg)) {
                    return "Timing matters! Some meds work best in the morning, others at night. Take with food or on empty stomach as directed. Ask your pharmacist if the timing isn't clear.";
                }
                
                // Refill
                if (/refill|run out|empty|prescription.*renew/i.test(lastMsg)) {
                    return "Don't wait until you're out! Request refills a week before you run out. Call your pharmacy or use their app. Plan ahead for holidays and weekends.";
                }
                
                // Dispose
                if (/dispose|throw away|expired|safe.*discard/i.test(lastMsg)) {
                    return "Don't flush most medications. Use pharmacy take-back programs or mix with coffee grounds in a sealed bag before throwing away. Remove personal info from prescription bottles.";
                }
                
                // Travel
                if (/travel|fly|airplane|hotel|vacation/i.test(lastMsg)) {
                    return "When traveling, keep medications in original bottles. Bring copies of prescriptions. Pack in carry-on for flights. Check destination laws for controlled substances.";
                }
                
                // General fallback
                return "That's a great question! For specific medical advice, talk to your doctor or pharmacist who knows your health history. Is there something else I can help with?";
            }
        };

        // System prompt for medication assistant
        const SYSTEM_PROMPT = `You are MedMinder AI, a helpful medication assistant. You help users manage their medications through natural conversation.

When a user wants to add a medication, respond with JSON in this format:
{"action": "add_med", "name": "Medication Name", "dosage": "dosage", "times": ["HH:MM"], "color": "blue|green|amber|rose|purple|teal", "food": "none|with|empty"}

When checking for drug interactions, respond with JSON:
{"action": "interaction_check", "medications": ["list of medications"], "concern": true|false, "message": "explanation"}

When providing advice or motivation, respond naturally.

Current medications: {meds}

Keep responses friendly, warm, and helpful.`;

        // Main App
        function App() {
            const [page, setPage] = useState('home');
            const [meds, setMeds] = useState([]);
            const [taken, setTaken] = useState({});
            const [history, setHistory] = useState([]);
            const [contacts, setContacts] = useState([]);
            const [sheet, setSheet] = useState(null);
            const [toast, setToast] = useState(null);
            const [undoKey, setUndoKey] = useState(null);
            const [apiKey, setApiKey] = useState(() => storage.get('apiKey', ''));
            const [aiTyping, setAiTyping] = useState(false);
            const [aiResponse, setAiResponse] = useState(null);
            const [aiInput, setAiInput] = useState('');
            
            // Settings state
            const [theme, setTheme] = useState(() => storage.get('theme', 'system'));
            const [notifications, setNotifications] = useState(() => storage.get('notifications', false));
            const [notificationSound, setNotificationSound] = useState(() => storage.get('notificationSound', true));
            const [weekStartsOn, setWeekStartsOn] = useState(() => storage.get('weekStartsOn', 0));
            
            const undoTimer = useRef(null);

            useEffect(() => {
                setMeds(storage.get('meds', []));
                setTaken(storage.get('taken', {}));
                setHistory(storage.get('history', []));
                const savedContacts = storage.get('contacts', []);
                if (Array.isArray(savedContacts)) {
                    setContacts(savedContacts);
                } else {
                    const converted = Object.entries(savedContacts || {})
                        .filter(([_, v]) => v && v.name)
                        .map(([label, v]) => ({ id: Date.now().toString() + label, name: v.name, label, phone: v.phone || '' }));
                    setContacts(converted);
                }
            }, []);

            useEffect(() => { storage.set('meds', meds); }, [meds]);
            useEffect(() => { storage.set('taken', taken); }, [taken]);
            useEffect(() => { storage.set('history', history); }, [history]);
            useEffect(() => { storage.set('contacts', contacts); }, [contacts]);
            useEffect(() => { storage.set('apiKey', apiKey); }, [apiKey]);
            useEffect(() => { storage.set('theme', theme); applyTheme(theme); }, [theme]);
            useEffect(() => { storage.set('notifications', notifications); }, [notifications]);
            useEffect(() => { storage.set('notificationSound', notificationSound); }, [notificationSound]);
            useEffect(() => { storage.set('weekStartsOn', weekStartsOn); }, [weekStartsOn]);

            // Apply theme
            const applyTheme = (t) => {
                if (t === 'system') {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    document.documentElement.setAttribute('data-theme', prefersDark ? '' : 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
                }
            };

            // Listen for system theme changes
            useEffect(() => {
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handleChange = () => { if (theme === 'system') applyTheme('system'); };
                mediaQuery.addEventListener('change', handleChange);
                applyTheme(theme);
                return () => mediaQuery.removeEventListener('change', handleChange);
            }, [theme]);

            const markTaken = useCallback((medId, time) => {
                const key = `${medId}-${time}`;
                const today = getToday();
                setTaken(prev => ({ ...prev, [today]: { ...(prev[today] || {}), [key]: true } }));
                const med = meds.find(m => m.id === medId);
                if (med) {
                    setHistory(prev => [{ id: Date.now(), name: med.name, time, date: today, action: 'taken' }, ...prev].slice(0, 100));
                }
                clearTimeout(undoTimer.current);
                setToast(`${med?.name} marked as taken`);
                setUndoKey(key);
                undoTimer.current = setTimeout(() => { setToast(null); setUndoKey(null); }, 5000);
            }, [meds]);

            const undoTaken = useCallback(() => {
                const today = getToday();
                setTaken(prev => {
                    const day = { ...(prev[today] || {}) };
                    delete day[undoKey];
                    return { ...prev, [today]: day };
                });
                setHistory(prev => prev.filter(h => !(h.date === today)));
                setToast(null);
                setUndoKey(null);
            }, [undoKey]);

            const deleteMed = useCallback((id) => {
                if (confirm('Remove this medication?')) setMeds(prev => prev.filter(m => m.id !== id));
            }, []);

            // AI Chat
            const handleAiSend = async () => {
                if (!aiInput.trim() || aiTyping) return;
                
                setAiTyping(true);
                const userMessage = aiInput.trim();
                setAiInput('');
                
                try {
                    const medsList = meds.map(m => `${m.name} ${m.dosage || ''}`).join(', ') || 'No medications added yet';
                    const systemPrompt = SYSTEM_PROMPT.replace('{meds}', medsList);
                    
                    console.log('Processing AI request...');
                    
                    const response = await aiClient.chat(apiKey, [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userMessage }
                    ]);
                    
                    console.log('AI Response:', response);
                    
                    setAiResponse({
                        text: response,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                    
                    // Try to parse action from response
                    try {
                        const jsonMatch = response.match(/\{[\s\S]*?\}/);
                        if (jsonMatch) {
                            const action = JSON.parse(jsonMatch[0]);
                            if (action.action === 'add_med') {
                                const newMed = {
                                    id: Date.now().toString(),
                                    name: action.name,
                                    dosage: action.dosage || '',
                                    times: action.times || ['08:00'],
                                    color: action.color || 'blue',
                                    food: action.food || 'none',
                                    notes: ''
                                };
                                setMeds(prev => [...prev, newMed]);
                                setAiResponse({
                                    text: `I've added ${action.name} to your medications. You can edit it anytime in the Meds tab!`,
                                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                                });
                            }
                        }
                    } catch (e) {
                        // Not JSON, just show response
                    }
                } catch (error) {
                    console.error('AI Error:', error);
                    setAiResponse({
                        text: `Error: ${error.message}. Please check your API key and try again.`,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                }
                
                setAiTyping(false);
            };

            // Stats
            const today = getToday();
            const allDoses = useMemo(() => meds.flatMap(m => m.times.map(t => ({ ...m, currentTime: t }))), [meds]);
            const totalToday = allDoses.length;
            const takenToday = useMemo(() => {
                const takenKeys = Object.keys(taken[today] || {});
                return takenKeys.filter(key => {
                    const medId = key.split('-').slice(0, -1).join('-');
                    return meds.some(m => m.id === medId);
                }).length;
            }, [taken, today, meds]);
            const percent = totalToday > 0 ? Math.round((takenToday / totalToday) * 100) : 0;

            const streak = useMemo(() => {
                let s = 0;
                for (let i = 0; i < 365; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    const medIds = meds.map(m => m.id);
                    const takenKeys = Object.keys(taken[ds] || {}).filter(key => {
                        const medId = key.split('-').slice(0, -1).join('-');
                        return medIds.includes(medId);
                    });
                    const total = meds.flatMap(m => m.times).length;
                    if (total > 0 && takenKeys.length >= total) s++;
                    else if (total > 0) break;
                }
                return s;
            }, [taken, meds]);

            const weeklyRate = useMemo(() => {
                let total = 0, done = 0;
                const medIds = meds.map(m => m.id);
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    total += meds.flatMap(m => m.times).length;
                    done += Object.keys(taken[ds] || {}).filter(key => {
                        const medId = key.split('-').slice(0, -1).join('-');
                        return medIds.includes(medId);
                    }).length;
                }
                return total > 0 ? Math.round((done / total) * 100) : 0;
            }, [taken, meds]);

            const getWeeklyData = useMemo(() => {
                const days = [];
                const medIds = meds.map(m => m.id);
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    const total = meds.flatMap(m => m.times).length;
                    const done = Object.keys(taken[ds] || {}).filter(key => {
                        const medId = key.split('-').slice(0, -1).join('-');
                        return medIds.includes(medId);
                    }).length;
                    days.push({
                        label: d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 2),
                        rate: total > 0 ? Math.round((done / total) * 100) : 0
                    });
                }
                return days;
            }, [taken, meds]);

            const groupMeds = useMemo(() => {
                const groups = { morning: [], afternoon: [], evening: [], night: [] };
                meds.forEach(m => {
                    m.times.forEach(t => {
                        const h = parseInt(t.split(':')[0]);
                        groups[getTimeOfDay(h)].push({ ...m, currentTime: t });
                    });
                });
                return groups;
            }, [meds]);

            const getProgressClass = () => {
                if (percent >= 80) return '';
                if (percent >= 50) return 'low';
                return 'critical';
            };

            const getProgressMsg = () => {
                if (totalToday === 0) return 'Add medications to track';
                if (percent === 100) return 'All done for today';
                if (percent >= 80) return 'Almost there';
                if (percent >= 50) return 'Keep going';
                if (takenToday > 0) return 'Good start';
                return 'Start your day';
            };

            // Render pages
            const renderHome = () => (
                <div className="page" key="home">
                    <div className="page-header">
                        <h1 className="page-title">{formatDate()}</h1>
                        <p className="page-subtitle">{takenToday} of {totalToday} medications taken</p>
                    </div>

                    {/* AI Chat Input */}
                    <div className="ai-input-container">
                        <div className="ai-input-header">
                            <Icon name="sparkles" size={16} />
                            Ask MedMinder AI
                        </div>
                        <div className="ai-input-row">
                            <textarea
                                className="ai-input"
                                placeholder="Ask about medications..."
                                value={aiInput}
                                onChange={(e) => setAiInput(e.target.value)}
                                onKeyDown={(e) => {
                                    if (e.key === 'Enter' && !e.shiftKey) {
                                        e.preventDefault();
                                        handleAiSend();
                                    }
                                }}
                                rows={1}
                            />
                            <button className="ai-send-btn" onClick={handleAiSend} disabled={aiTyping}>
                                <Icon name="send" size={20} />
                            </button>
                        </div>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 12 }}>
                            {[
                                { text: 'What is metformin?', icon: '?' },
                                { text: 'Missed a dose', icon: '!' },
                                { text: 'Store my meds?', icon: '+' },
                                { text: 'Alcohol interactions', icon: 'x' }
                            ].map((prompt, i) => (
                                <button
                                    key={i}
                                    onClick={() => { setAiInput(prompt.text); setTimeout(handleAiSend, 100); }}
                                    style={{
                                        padding: '8px 14px',
                                        fontSize: 12,
                                        background: 'var(--bg-primary)',
                                        border: '1px solid var(--border-subtle)',
                                        borderRadius: 'var(--radius-full)',
                                        color: 'var(--text-secondary)',
                                        cursor: 'pointer',
                                        fontFamily: 'inherit',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: 6,
                                        transition: 'all var(--transition-fast)'
                                    }}
                                >
                                    <span style={{
                                        width: 16,
                                        height: 16,
                                        borderRadius: '50%',
                                        background: 'var(--accent-purple-dim)',
                                        color: 'var(--accent-purple)',
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        fontSize: 10,
                                        fontWeight: 600
                                    }}>
                                        {prompt.icon}
                                    </span>
                                    {prompt.text}
                                </button>
                            ))}
                        </div>
                    </div>

                    {aiTyping && (
                        <div className="ai-typing">
                            <span className="ai-dot"></span>
                            <span className="ai-dot"></span>
                            <span className="ai-dot"></span>
                            Thinking...
                        </div>
                    )}

                    {aiResponse && !aiTyping && (
                        <div className="ai-response">
                            <div className="ai-response-header">
                                <div className="ai-response-label">
                                    <Icon name="robot" size={16} />
                                    MedMinder AI
                                </div>
                                <div className="ai-response-time">{aiResponse.time}</div>
                            </div>
                            <div className="ai-response-content">{aiResponse.text}</div>
                        </div>
                    )}

                    <div className="progress-card">
                        <div className="progress-row">
                            <div className="progress-ring-wrap">
                                <svg className="progress-ring" width="90" height="90">
                                    <circle className="progress-ring-bg" cx="45" cy="45" r="38" />
                                    <circle
                                        className={`progress-ring-fill ${getProgressClass()}`}
                                        cx="45" cy="45" r="38"
                                        strokeDasharray={`${2 * Math.PI * 38}`}
                                        strokeDashoffset={`${2 * Math.PI * 38 * (1 - percent / 100)}`}
                                    />
                                </svg>
                                <div className="progress-center">
                                    <div className="progress-percent">{percent}%</div>
                                    <div className="progress-label">Today</div>
                                </div>
                            </div>
                            <div className="progress-info">
                                <div className="progress-done">{takenToday} <span>of {totalToday}</span></div>
                                <p className="progress-msg">{getProgressMsg()}</p>
                            </div>
                        </div>
                    </div>

                    {Object.entries(groupMeds).map(([period, items]) => 
                        items.length > 0 && (
                            <div className="med-section" key={period}>
                                <div className="med-section-title">
                                    <Icon name={getTimeIcon(parseInt(items[0]?.currentTime?.split(':')[0] || 12))} size={14} />
                                    {period}
                                </div>
                                {items.map(med => {
                                    const key = `${med.id}-${med.currentTime}`;
                                    const isTaken = taken[today]?.[key];
                                    return (
                                        <div className={`med-card ${isTaken ? 'done' : ''}`} data-color={med.color || 'blue'} key={key}>
                                            <div className="med-color-bar" style={{ background: `var(--accent-${med.color || 'blue'})` }} />
                                            <div className="med-info">
                                                <div className="med-name">{med.name}</div>
                                                <div className="med-meta">
                                                    <span className="med-dosage">{med.dosage}</span>
                                                    <span className="med-time">
                                                        <Icon name="clock" size={12} />
                                                        {formatTime(med.currentTime)}
                                                    </span>
                                                </div>
                                            </div>
                                            {isTaken ? (
                                                <div className="med-check"><Icon name="check" size={18} /></div>
                                            ) : (
                                                <button className="med-btn" onClick={() => markTaken(med.id, med.currentTime)}>Take</button>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    )}

                    {meds.length === 0 && (
                        <div className="empty-state">
                            <div className="empty-icon"><Icon name="pill" size={32} /></div>
                            <h3 className="empty-title">No medications yet</h3>
                            <p className="empty-text">Tap the + button to add your first medication</p>
                        </div>
                    )}
                </div>
            );

            const renderMeds = () => (
                <div className="page" key="meds">
                    <div className="page-header">
                        <h1 className="page-title">Medications</h1>
                        <p className="page-subtitle">{meds.length} tracked</p>
                    </div>

                    {meds.length === 0 ? (
                        <div className="empty-state">
                            <div className="empty-icon"><Icon name="pill" size={32} /></div>
                            <h3 className="empty-title">No medications</h3>
                            <p className="empty-text">Add medications to start tracking</p>
                        </div>
                    ) : (
                        meds.map(med => (
                            <div className="list-item" key={med.id}>
                                <div style={{ width: 6, height: 44, borderRadius: 3, background: `var(--accent-${med.color || 'blue'})`, flexShrink: 0 }} />
                                <div className="list-item-info">
                                    <div className="list-item-title">{med.name}</div>
                                    <div className="list-item-sub">{med.dosage}</div>
                                    <div className="list-item-chips">
                                        {med.times.map(t => <span className="chip" key={t}>{formatTime(t)}</span>)}
                                        {med.food !== 'none' && <span className="chip">{med.food === 'with' ? 'With food' : 'Empty'}</span>}
                                    </div>
                                </div>
                                <button className="icon-btn" onClick={() => setSheet({ type: 'edit', med })}>
                                    <Icon name="edit" />
                                </button>
                            </div>
                        ))
                    )}
                </div>
            );

            const renderProgress = () => (
                <div className="page" key="progress">
                    <div className="page-header">
                        <h1 className="page-title">Progress</h1>
                        <p className="page-subtitle">Your medication adherence</p>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-icon flame"><Icon name="flame" /></div>
                            <div className="stat-value">{streak}</div>
                            <div className="stat-label">Day Streak</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon rate"><Icon name="percent" /></div>
                            <div className="stat-value">{weeklyRate}%</div>
                            <div className="stat-label">This Week</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon total"><Icon name="check" /></div>
                            <div className="stat-value">{history.length}</div>
                            <div className="stat-label">Total Taken</div>
                        </div>
                    </div>

                    <div className="chart-card">
                        <div className="chart-header">
                            <span className="chart-title">Weekly Overview</span>
                            <div className="chart-legend">
                                <span><span className="legend-dot" style={{ background: 'var(--accent-green)' }} />80%+</span>
                                <span><span className="legend-dot" style={{ background: 'var(--accent-amber)' }} />60-80%</span>
                                <span><span className="legend-dot" style={{ background: 'var(--accent-rose)' }} />Below</span>
                            </div>
                        </div>
                        <div className="bar-chart">
                            {getWeeklyData.map((d, i) => (
                                <div className="bar-day" key={i}>
                                    <div className="bar" style={{
                                        height: `${Math.max(d.rate, 4)}%`,
                                        background: d.rate >= 80 ? 'var(--accent-green)' : d.rate >= 60 ? 'var(--accent-amber)' : 'var(--accent-rose)'
                                    }} />
                                    <div className="bar-label">{d.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="history-list">
                        <div className="history-header">Recent History</div>
                        {history.slice(0, 20).map(h => (
                            <div className="history-item" key={h.id}>
                                <div className={`history-icon ${h.action}`}>
                                    <Icon name={h.action === 'taken' ? 'check' : 'x'} />
                                </div>
                                <div className="history-info">
                                    <div className="history-name">{h.name}</div>
                                    <div className="history-meta">{formatTime(h.time)}</div>
                                </div>
                                <div className="history-date">{new Date(h.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                            </div>
                        ))}
                        {history.length === 0 && (
                            <div className="empty-state" style={{ padding: 32 }}>
                                <p className="empty-text">No history yet</p>
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderContacts = () => (
                <div className="page" key="contacts">
                    <div className="page-header">
                        <h1 className="page-title">Contacts</h1>
                        <p className="page-subtitle">{contacts.length} contact{contacts.length !== 1 ? 's' : ''}</p>
                    </div>

                    <div className="contact-list">
                        {contacts.map(contact => (
                            <div className="contact-card-new" key={contact.id}>
                                <div className="contact-avatar">
                                    {contact.name.charAt(0).toUpperCase()}
                                </div>
                                <div className="contact-info">
                                    <div className="contact-name-new">{contact.name}</div>
                                    <div className="contact-label">{contact.label}</div>
                                    <div className="contact-phone-new">{contact.phone}</div>
                                </div>
                                <div className="contact-card-actions">
                                    <button className="contact-call-btn" onClick={() => {
                                        window.location.href = `tel:${contact.phone.replace(/\D/g, '')}`;
                                    }}>
                                        <Icon name="phone" />
                                    </button>
                                    <button className="contact-delete-btn" onClick={() => {
                                        if (confirm('Delete this contact?')) {
                                            setContacts(prev => prev.filter(c => c.id !== contact.id));
                                        }
                                    }}>
                                        <Icon name="trash" />
                                    </button>
                                </div>
                            </div>
                        ))}

                        <button className="add-contact-btn" onClick={() => setSheet({ type: 'addContact' })}>
                            <Icon name="plus" />
                            Add Contact
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="app">
                    <ThreeBackground />
                    
                    {/* Tutorial Welcome Modal */}
                    {storage.get('showTutorial', true) && (
                        <div style={{position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px'}}>
                            <div style={{background: 'var(--bg-primary)', border: '1px solid var(--border-medium)', borderRadius: '20px', padding: '32px', maxWidth: '380px', textAlign: 'center'}}>
                                <div style={{width: '72px', height: '72px', margin: '0 auto 20px', background: 'linear-gradient(135deg, var(--accent-green), var(--accent-teal))', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                                    <Icon name="robot" size={36} />
                                </div>
                                <h2 style={{fontFamily: 'Instrument Serif', fontSize: '28px', marginBottom: '10px'}}>Welcome to MedMinder!</h2>
                                <p style={{fontSize: '16px', color: 'var(--text-secondary)', marginBottom: '28px', lineHeight: '1.5'}}>Your personal medication helper with AI voice assistant.</p>
                                <button style={{display: 'inline-block', padding: '16px 32px', background: 'var(--accent-green)', color: 'white', border: 'none', borderRadius: '9999px', fontSize: '18px', fontWeight: '600', cursor: 'pointer', marginBottom: '12px', minWidth: '180px'}} onClick={() => { storage.set('showTutorial', false); location.reload(); }}>
                                    Get Started
                                </button>
                            </div>
                        </div>
                    )}
                    
                    <header className="header">
                        <div className="header-left">
                            <div className="logo-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                                </svg>
                            </div>
                            <span className="logo-text">MedMinder</span>
                        </div>
                        <button className="header-btn" onClick={() => setSheet({ type: 'settings' })}>
                            <Icon name="settings" />
                        </button>
                    </header>

                    <main className="content">
                        {page === 'home' && renderHome()}
                        {page === 'meds' && renderMeds()}
                        {page === 'progress' && renderProgress()}
                        {page === 'contacts' && renderContacts()}
                        {page === 'companion' && <div className="page">
                            <div className="page-header">
                                <h1 className="page-title">AI Companion</h1>
                                <p className="page-subtitle">Your friendly voice assistant</p>
                            </div>
                            <div style={{padding: '20px'}}>
                                <div style={{textAlign: 'center', padding: '24px', background: 'linear-gradient(135deg, var(--accent-purple-dim), var(--bg-surface))', borderRadius: '16px', marginBottom: '20px', border: '1px solid var(--border-subtle)'}}>
                                    <div style={{fontSize: '48px', marginBottom: '12px'}}>🤖</div>
                                    <h2 style={{marginBottom: '8px', fontFamily: 'Instrument Serif', fontSize: '24px'}}>Hello! I'm here to help.</h2>
                                    <p style={{color: 'var(--text-secondary)', fontSize: '15px'}}>I can answer questions about medications, help with your phone, or just chat.</p>
                                </div>
                                <p style={{fontSize: '14px', color: 'var(--text-secondary)', marginBottom: '12px', fontWeight: '500'}}>Try asking me:</p>
                                <div style={{display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '20px'}}>
                                    <button style={{padding: '12px 16px', background: 'var(--bg-surface)', border: '1px solid var(--border-medium)', borderRadius: '9999px', color: 'var(--text-primary)', fontSize: '14px', cursor: 'pointer'}} onClick={() => setAiInput("How do I send a text?")}>How do I send a text?</button>
                                    <button style={{padding: '12px 16px', background: 'var(--bg-surface)', border: '1px solid var(--border-medium)', borderRadius: '9999px', color: 'var(--text-primary)', fontSize: '14px', cursor: 'pointer'}} onClick={() => setAiInput("What medications do I take?")}>What meds do I take?</button>
                                    <button style={{padding: '12px 16px', background: 'var(--bg-surface)', border: '1px solid var(--border-medium)', borderRadius: '9999px', color: 'var(--text-primary)', fontSize: '14px', cursor: 'pointer'}} onClick={() => setAiInput("How do I take a photo?")}>How do I take a photo?</button>
                                </div>
                                <div style={{display: 'flex', gap: '10px', marginBottom: '16px'}}>
                                    <input 
                                        type="text" 
                                        placeholder="Type your question..." 
                                        value={aiInput}
                                        onChange={e => setAiInput(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleAiSend()}
                                        style={{flex: 1, padding: '16px', borderRadius: '12px', border: '1px solid var(--border-medium)', background: 'var(--bg-surface)', color: 'var(--text-primary)', fontSize: '16px'}}
                                    />
                                    <button style={{width: '56px', height: '56px', borderRadius: '12px', background: 'var(--accent-purple)', border: 'none', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0}} onClick={handleAiSend} disabled={!aiInput.trim() || aiTyping}>
                                        <Icon name="send" />
                                    </button>
                                </div>
                                <button style={{width: '100%', padding: '16px', background: 'linear-gradient(135deg, var(--accent-teal-dim), var(--bg-surface))', border: '2px solid var(--accent-teal)', borderRadius: '12px', color: 'var(--accent-teal)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px', cursor: 'pointer', fontSize: '16px', fontWeight: '500'}}>
                                    <Icon name="mic" size={20} />
                                    Hold to speak
                                </button>
                                {aiTyping && <div style={{textAlign: 'center', padding: '16px', color: 'var(--text-secondary)'}}>AI is thinking...</div>}
                                {aiResponse && (
                                    <div style={{background: 'var(--bg-surface)', border: '1px solid var(--border-medium)', borderRadius: '12px', padding: '16px', marginTop: '16px'}}>
                                        <p style={{fontSize: '14px', color: 'var(--accent-purple)', fontWeight: '600', marginBottom: '8px'}}><Icon name="robot" size={14} /> AI Response</p>
                                        <p style={{fontSize: '16px', lineHeight: '1.6'}}>{aiResponse.text}</p>
                                    </div>
                                )}
                            </div>
                        </div>}
                                />
                                <button style={{padding: '16px 32px', background: 'var(--accent-purple)', color: 'white', border: 'none', borderRadius: '12px', fontSize: '16px', fontWeight: '600', cursor: 'pointer'}}>
                                    Ask AI
                                </button>
                            </div>
                        </div>}
                    </main>

                    <nav className="bottom-nav">
                        <button className={`nav-btn ${page === 'home' ? 'active' : ''}`} onClick={() => setPage('home')}>
                            <Icon name="home" />
                            Home
                        </button>
                        <button className={`nav-btn ${page === 'meds' ? 'active' : ''}`} onClick={() => setPage('meds')}>
                            <Icon name="pill" />
                            Meds
                        </button>
                        <button className={`nav-btn ${page === 'companion' ? 'active' : ''}`} onClick={() => setPage('companion')}>
                            <Icon name="robot" />
                            AI
                        </button>
                        <button className={`nav-btn ${page === 'progress' ? 'active' : ''}`} onClick={() => setPage('progress')}>
                            <Icon name="chart" />
                            Progress
                        </button>
                        <button className={`nav-btn ${page === 'contacts' ? 'active' : ''}`} onClick={() => setPage('contacts')}>
                            <Icon name="phone" />
                            Contacts
                        </button>
                    </nav>

                    <button className="fab" onClick={() => setSheet({ type: 'add' })}>
                        <Icon name="plus" />
                    </button>

                    <div className={`sheet-overlay ${sheet ? 'active' : ''}`} onClick={() => setSheet(null)} />
                    <div className={`bottom-sheet ${sheet ? 'active' : ''}`}>
                        <div className="sheet-handle" />
                        <h3 className="sheet-title">
                            {sheet?.type === 'add' ? 'Add Medication' : 
                             sheet?.type === 'edit' ? 'Edit Medication' : 
                             sheet?.type === 'contact' ? 'Edit Contact' :
                             sheet?.type === 'addContact' ? 'Add Contact' :
                             sheet?.type === 'settings' ? 'Settings' : ''}
                        </h3>
                        
                        {sheet?.type === 'settings' && (
                            <div>
                                {/* Appearance */}
                                <div className="settings-group">
                                    <div className="settings-group-header">
                                        <Icon name="sparkles" />
                                        Appearance
                                    </div>
                                    <div className="settings-row">
                                        <div>
                                            <div className="settings-label">Theme</div>
                                            <div className="settings-desc">Choose your preferred theme</div>
                                        </div>
                                        <div className="theme-btns">
                                            <button className={`theme-btn ${theme === 'dark' ? 'active' : ''}`} onClick={() => setTheme('dark')}>
                                                <Icon name="moon" size={14} />
                                            </button>
                                            <button className={`theme-btn ${theme === 'light' ? 'active' : ''}`} onClick={() => setTheme('light')}>
                                                <Icon name="sun" size={14} />
                                            </button>
                                            <button className={`theme-btn ${theme === 'system' ? 'active' : ''}`} onClick={() => setTheme('system')}>
                                                <Icon name="monitor" size={14} />
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Notifications */}
                                <div className="settings-group">
                                    <div className="settings-group-header">
                                        <Icon name="bell" />
                                        Notifications
                                    </div>
                                    <div className="settings-row">
                                        <div>
                                            <div className="settings-label">Enable Notifications</div>
                                            <div className="settings-desc">Get reminders for your medications</div>
                                        </div>
                                        <label className="toggle">
                                            <input type="checkbox" checked={notifications} onChange={(e) => {
                                                setNotifications(e.target.checked);
                                                if (e.target.checked && 'Notification' in window) {
                                                    Notification.requestPermission();
                                                }
                                            }} />
                                            <span className="toggle-slider"></span>
                                        </label>
                                    </div>
                                    <div className="settings-row">
                                        <div>
                                            <div className="settings-label">Notification Sound</div>
                                            <div className="settings-desc">Play sound with reminders</div>
                                        </div>
                                        <label className="toggle">
                                            <input type="checkbox" checked={notificationSound} onChange={(e) => setNotificationSound(e.target.checked)} />
                                            <span className="toggle-slider"></span>
                                        </label>
                                    </div>
                                </div>

                                {/* Calendar */}
                                <div className="settings-group">
                                    <div className="settings-group-header">
                                        <Icon name="calendar" />
                                        Calendar
                                    </div>
                                    <div className="settings-row">
                                        <div>
                                            <div className="settings-label">Week Starts On</div>
                                        </div>
                                        <select className="settings-select" value={weekStartsOn} onChange={(e) => setWeekStartsOn(Number(e.target.value))}>
                                            <option value={0}>Sunday</option>
                                            <option value={1}>Monday</option>
                                        </select>
                                    </div>
                                </div>

                                {/* AI */}
                                <div className="settings-group">
                                    <div className="settings-group-header">
                                        <Icon name="robot" />
                                        AI Assistant
                                    </div>
                                    <div className="settings-row">
                                        <div>
                                            <div className="settings-label">Built-in AI</div>
                                            <div className="settings-desc">No API key required</div>
                                        </div>
                                        <span style={{ color: 'var(--accent-green)', fontSize: 13 }}>Active</span>
                                    </div>
                                </div>

                                {/* Data */}
                                <div className="settings-group">
                                    <div className="settings-group-header">
                                        <Icon name="shield" />
                                        Data
                                    </div>
                                    <div className="settings-row" style={{ flexDirection: 'column', alignItems: 'stretch', gap: 10 }}>
                                        <button className="settings-btn" onClick={() => {
                                            const data = JSON.stringify({ meds, taken, history, contacts }, null, 2);
                                            const blob = new Blob([data], { type: 'application/json' });
                                            const url = URL.createObjectURL(blob);
                                            const a = document.createElement('a');
                                            a.href = url;
                                            a.download = `medminder-backup-${new Date().toISOString().split('T')[0]}.json`;
                                            a.click();
                                            URL.revokeObjectURL(url);
                                            setToast('Data exported!');
                                        }}>
                                            <Icon name="download" /> Export Data
                                        </button>
                                        <button className="settings-btn" onClick={() => {
                                            const input = document.createElement('input');
                                            input.type = 'file';
                                            input.accept = '.json';
                                            input.onchange = (e) => {
                                                const file = e.target.files[0];
                                                if (file) {
                                                    const reader = new FileReader();
                                                    reader.onload = (ev) => {
                                                        try {
                                                            const data = JSON.parse(ev.target.result);
                                                            if (data.meds) setMeds(data.meds);
                                                            if (data.taken) setTaken(data.taken);
                                                            if (data.history) setHistory(data.history);
                                                            if (data.contacts) setContacts(data.contacts);
                                                            setToast('Data imported successfully!');
                                                        } catch (err) {
                                                            setToast('Failed to import data');
                                                        }
                                                    };
                                                    reader.readAsText(file);
                                                }
                                            };
                                            input.click();
                                        }}>
                                            <Icon name="upload" /> Import Data
                                        </button>
                                        <button className="settings-btn danger" onClick={() => {
                                            if (confirm('This will delete all your medications, history, and contacts. Are you sure?')) {
                                                if (confirm('This cannot be undone. Really delete everything?')) {
                                                    setMeds([]);
                                                    setTaken({});
                                                    setHistory([]);
                                                    setContacts([]);
                                                    setToast('All data cleared');
                                                }
                                            }
                                        }}>
                                            <Icon name="trash2" /> Clear All Data
                                        </button>
                                    </div>
                                </div>

                                {/* About */}
                                <div className="settings-group">
                                    <div className="settings-group-header">
                                        <Icon name="info" />
                                        About
                                    </div>
                                    <div className="about-section">
                                        <div className="about-logo">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                <path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
                                                <path d="m8.5 8.5 7 7"/>
                                            </svg>
                                        </div>
                                        <div className="about-name">MedMinder</div>
                                        <div className="about-version">Version 1.0.0</div>
                                        <div className="version-tag">
                                            <Icon name="shield" size={12} />
                                            Your calming medication companion
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {sheet?.type === 'addContact' && (
                            <div className="contact-form">
                                <div className="form-group">
                                    <label className="form-label">Name</label>
                                    <input className="form-input" id="contact-name" placeholder="e.g., Mom, Dr. Smith" />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Label</label>
                                    <input className="form-input" id="contact-label" placeholder="e.g., Family, Doctor" />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Phone Number</label>
                                    <input className="form-input" id="contact-phone" type="tel" placeholder="e.g., (555) 123-4567" />
                                </div>
                                <button className="btn btn-primary" style={{ marginTop: 8 }} onClick={() => {
                                    const name = document.getElementById('contact-name').value.trim();
                                    const label = document.getElementById('contact-label').value.trim() || 'Contact';
                                    const phone = document.getElementById('contact-phone').value.trim();
                                    if (name && phone) {
                                        setContacts(prev => [...prev, { id: Date.now().toString(), name, label, phone }]);
                                        setSheet(null);
                                    } else {
                                        setToast('Please enter name and phone number');
                                    }
                                }}>
                                    Add Contact
                                </button>
                            </div>
                        )}
                        
                        {(sheet?.type === 'add' || sheet?.type === 'edit') && (
                            <MedForm
                                med={sheet?.type === 'edit' ? sheet.med : null}
                                onSave={(data) => {
                                    if (sheet?.type === 'edit') setMeds(prev => prev.map(m => m.id === sheet.med.id ? { ...m, ...data } : m));
                                    else setMeds(prev => [...prev, { ...data, id: Date.now().toString() }]);
                                    setSheet(null);
                                }}
                                onDelete={sheet?.type === 'edit' ? () => { deleteMed(sheet.med.id); setSheet(null); } : null}
                            />
                        )}
                    </div>

                    <div className={`toast ${toast ? 'show' : ''}`}>
                        <span className="toast-msg">{toast}</span>
                        <button className="toast-undo" onClick={undoTaken}>Undo</button>
                    </div>
                </div>
            );
        }

        // Med Form
        function MedForm({ med, onSave, onDelete }) {
            const [form, setForm] = useState({
                name: med?.name || '',
                dosage: med?.dosage || '',
                color: med?.color || 'blue',
                times: med?.times || ['08:00'],
                food: med?.food || 'none',
                notes: med?.notes || ''
            });

            return (
                <form onSubmit={(e) => { e.preventDefault(); onSave(form); }}>
                    <div className="form-group">
                        <label className="form-label">Name</label>
                        <input className="form-input" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Medication name" required />
                    </div>

                    <div className="form-row">
                        <div className="form-group">
                            <label className="form-label">Dosage</label>
                            <input className="form-input" value={form.dosage} onChange={e => setForm(f => ({ ...f, dosage: e.target.value }))} placeholder="e.g., 100mg" />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Color</label>
                            <div className="color-swatches">
                                {['blue', 'green', 'amber', 'rose', 'purple', 'teal'].map(c => (
                                    <div key={c} className={`swatch swatch-${c} ${form.color === c ? 'selected' : ''}`} onClick={() => setForm(f => ({ ...f, color: c }))} />
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="form-group">
                        <label className="form-label">Times</label>
                        <div className="times-list">
                            {form.times.map((t, i) => (
                                <div className="time-row" key={i}>
                                    <input type="time" value={t} onChange={e => {
                                        const times = [...form.times];
                                        times[i] = e.target.value;
                                        setForm(f => ({ ...f, times }));
                                    }} />
                                    {form.times.length > 1 && (
                                        <button type="button" className="icon-btn" onClick={() => setForm(f => ({ ...f, times: f.times.filter((_, j) => j !== i) }))}>
                                            <Icon name="x" size={16} />
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                        {form.times.length < 6 && (
                            <button type="button" className="add-btn" onClick={() => setForm(f => ({ ...f, times: [...f.times, '12:00'] }))}>
                                <Icon name="plus" size={16} /> Add time
                            </button>
                        )}
                    </div>

                    <div className="form-group">
                        <label className="form-label">Take with food</label>
                        <div className="food-btns">
                            {[['none', 'Any'], ['with', 'With food'], ['empty', 'Empty stomach']].map(([v, l]) => (
                                <button key={v} type="button" className={`food-btn ${form.food === v ? 'selected' : ''}`} onClick={() => setForm(f => ({ ...f, food: v }))}>{l}</button>
                            ))}
                        </div>
                    </div>

                    <div className="form-group">
                        <label className="form-label">Notes</label>
                        <textarea className="form-input" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Optional notes..." />
                    </div>

                    <button type="submit" className="btn btn-primary">{med ? 'Save Changes' : 'Add Medication'}</button>
                    {onDelete && <button type="button" className="btn btn-danger" onClick={onDelete}><Icon name="trash" size={18} /> Delete Medication</button>}
                </form>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
