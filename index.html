<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f1e">
    <meta name="description" content="MedMinder - Your calming medication companion with AI">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MedMinder</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-surface: rgba(255,255,255,0.04);
            --bg-surface-hover: rgba(255,255,255,0.08);
            --border-subtle: rgba(255,255,255,0.06);
            --border-medium: rgba(255,255,255,0.12);
            --text-primary: #f0ede8;
            --text-secondary: rgba(240,237,232,0.55);
            --text-tertiary: rgba(240,237,232,0.3);
            --accent-green: #7eb89a;
            --accent-green-dim: rgba(126,184,154,0.12);
            --accent-amber: #e8a97e;
            --accent-amber-dim: rgba(232,169,126,0.1);
            --accent-rose: #c97b84;
            --accent-rose-dim: rgba(201,123,132,0.1);
            --accent-blue: #7aa3c8;
            --accent-blue-dim: rgba(122,163,200,0.1);
            --accent-purple: #9b8dc4;
            --accent-purple-dim: rgba(155,141,196,0.1);
            --accent-teal: #6bb3b3;
            --accent-teal-dim: rgba(107,179,179,0.1);
            --radius-xs: 6px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.15);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.2);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.25);
            --transition-fast: 150ms ease;
            --transition-base: 200ms ease;
            --transition-slow: 300ms ease;
            --font-size-base: 15px;
            --font-size-lg: 18px;
            --font-size-xl: 22px;
            --font-size-xxl: 28px;
        }

        [data-theme="light"] {
            --bg-primary: #f5f3f0;
            --bg-surface: rgba(255,255,255,0.7);
            --bg-surface-hover: rgba(0,0,0,0.03);
            --border-subtle: rgba(0,0,0,0.06);
            --border-medium: rgba(0,0,0,0.1);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(26,26,46,0.55);
            --text-tertiary: rgba(26,26,46,0.3);
            --accent-green-dim: rgba(126,184,154,0.15);
            --accent-amber-dim: rgba(232,169,126,0.12);
            --accent-rose-dim: rgba(201,123,132,0.12);
            --accent-blue-dim: rgba(122,163,200,0.12);
            --accent-purple-dim: rgba(155,141,196,0.12);
            --accent-teal-dim: rgba(107,179,179,0.12);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: var(--font-size-base);
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--bg-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

        #root { height: 100%; display: flex; flex-direction: column; }

        #three-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header - Glassmorphism */
        .header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10,15,30,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        [data-theme="light"] .header {
            background: rgba(245,243,240,0.85);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-green), #5a9a7a);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm), 0 0 20px rgba(126,184,154,0.2);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }

        .logo-icon:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md), 0 0 24px rgba(126,184,154,0.3);
        }

        .logo-icon svg { width: 20px; height: 20px; stroke: var(--bg-primary); }

        .logo-text {
            font-family: 'Instrument Serif', serif;
            font-size: 22px;
            letter-spacing: -0.02em;
            font-weight: 400;
        }

        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .header-btn:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
            transform: scale(1.05);
        }

        .header-btn:active {
            transform: scale(0.95);
        }

        .header-btn svg { width: 18px; height: 18px; }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 130px;
        }

        /* Page Transitions */
        .page {
            opacity: 0;
            animation: pageIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pageIn { 
            from { opacity: 0; transform: translateY(12px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes slideUp { 
            from { transform: translateY(16px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        @keyframes scaleIn { 
            from { transform: scale(0.95); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }
        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.6; } 
        }

        /* Page Header */
        .page-header { margin-bottom: 20px; }
        .page-title {
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 2px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .page-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.05s;
            opacity: 0;
        }

        /* AI Chat Input */
        .ai-input-container {
            background: linear-gradient(135deg, var(--accent-purple-dim) 0%, var(--bg-surface) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 20px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.08s;
            opacity: 0;
            box-shadow: var(--shadow-sm);
        }

        .ai-input-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--accent-purple);
            font-size: 13px;
            font-weight: 600;
        }

        .ai-input-header svg { width: 16px; height: 16px; }

        .ai-input-row {
            display: flex;
            gap: 10px;
        }

        .ai-input {
            flex: 1;
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            transition: border-color var(--transition-fast);
        }

        .ai-input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        .ai-input::placeholder { color: var(--text-tertiary); }

        .ai-send-btn {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: var(--accent-purple);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-base);
            flex-shrink: 0;
        }

        .ai-send-btn:hover { background: #a894d4; transform: scale(1.05); }
        .ai-send-btn:active { transform: scale(0.95); }
        .ai-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .ai-send-btn svg { width: 18px; height: 18px; }

        .ai-typing {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 16px;
            color: var(--text-secondary);
            font-size: 13px;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
        }

        .ai-dot {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 50%;
            animation: typing 1.2s ease-in-out infinite;
        }

        .ai-dot:nth-child(2) { animation-delay: 0.15s; }
        .ai-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
            30% { transform: translateY(-6px) scale(1.2); opacity: 1; }
        }

        /* AI Response */
        .ai-response {
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 20px;
            animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--shadow-sm);
        }

        .ai-response-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .ai-response-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-green);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .ai-response-label svg { width: 14px; height: 14px; }

        .ai-response-time {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .ai-response-content {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .ai-response-content strong { color: var(--text-primary); }

        .ai-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--accent-green-dim);
            border: 1px solid var(--accent-green);
            border-radius: var(--radius-full);
            color: var(--accent-green);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: all var(--transition-base);
            font-family: inherit;
        }

        .ai-action-btn:hover { background: var(--accent-green); color: var(--bg-primary); }
        .ai-action-btn svg { width: 14px; height: 14px; }

        /* Progress Card - Hero Style */
        .progress-card {
            background: linear-gradient(135deg, var(--accent-green-dim) 0%, var(--bg-surface) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.1s;
            opacity: 0;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .progress-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--accent-green) 0%, transparent 70%);
            opacity: 0.05;
        }

        .progress-row {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .progress-ring-wrap {
            position: relative;
            width: 96px;
            height: 96px;
            flex-shrink: 0;
        }

        .progress-ring { transform: rotate(-90deg); }
        .progress-ring-bg { fill: none; stroke: var(--border-medium); stroke-width: 8; }
        .progress-ring-fill {
            fill: none;
            stroke: var(--accent-green);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 0 8px var(--accent-green));
        }
        .progress-ring-fill.low { stroke: var(--accent-amber); filter: drop-shadow(0 0 8px var(--accent-amber)); }
        .progress-ring-fill.critical { stroke: var(--accent-rose); filter: drop-shadow(0 0 8px var(--accent-rose)); }

        .progress-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .progress-percent {
            font-family: 'Instrument Serif', serif;
            font-size: 26px;
            line-height: 1;
            color: var(--accent-green);
        }

        .progress-label {
            font-size: 8px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 2px;
        }

        .progress-info { flex: 1; }
        .progress-done {
            font-family: 'Instrument Serif', serif;
            font-size: 36px;
            line-height: 1;
            color: var(--text-primary);
        }
        .progress-done span {
            font-size: 20px;
            color: var(--text-tertiary);
            font-family: 'DM Sans', sans-serif;
        }
        .progress-msg { 
            color: var(--text-secondary); 
            font-size: 14px; 
            margin-top: 6px;
            font-weight: 500;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 14px 10px;
            text-align: center;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            margin: 0 auto 6px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.flame { background: var(--accent-amber-dim); color: var(--accent-amber); }
        .stat-icon.rate { background: var(--accent-green-dim); color: var(--accent-green); }
        .stat-icon.total { background: var(--accent-blue-dim); color: var(--accent-blue); }
        .stat-icon svg { width: 16px; height: 16px; }

        .stat-value {
            font-family: 'Instrument Serif', serif;
            font-size: 20px;
            line-height: 1.1;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 2px;
        }

        /* Med Section */
        .med-section { margin-bottom: 24px; }

        .med-section-title {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-tertiary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            padding-left: 4px;
        }

        .med-section-title svg { width: 14px; height: 14px; }

        /* Med Card */
        .med-card {
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .med-card:hover {
            background: var(--bg-surface-hover);
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }

        .med-card:active {
            transform: scale(0.98) translateX(2px);
        }

        .med-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
        }

        .med-card[data-color="blue"]::before { background: var(--accent-blue); box-shadow: 0 0 12px var(--accent-blue); }
        .med-card[data-color="green"]::before { background: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); }
        .med-card[data-color="amber"]::before { background: var(--accent-amber); box-shadow: 0 0 12px var(--accent-amber); }
        .med-card[data-color="rose"]::before { background: var(--accent-rose); box-shadow: 0 0 12px var(--accent-rose); }
        .med-card[data-color="purple"]::before { background: var(--accent-purple); box-shadow: 0 0 12px var(--accent-purple); }
        .med-card[data-color="teal"]::before { background: var(--accent-teal); box-shadow: 0 0 12px var(--accent-teal); }

        .med-card:hover { background: var(--bg-surface-hover); transform: translateX(4px); }
        .med-card.done { opacity: 0.5; }
        .med-card.done .med-name { text-decoration: line-through; text-decoration-color: var(--text-tertiary); }
        .med-card.missed { border-left: 4px solid var(--accent-rose); background: var(--accent-rose-dim); }
        .med-card.missed .med-name { color: var(--accent-rose); }
        .med-missed-badge { background: var(--accent-rose); color: white; padding: 6px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; }
        .med-actions { display: flex; gap: 8px; }
        .med-btn.take { background: var(--accent-green); }
        .med-btn.miss { background: var(--accent-rose); }

        .med-color-bar {
            width: 4px;
            height: 40px;
            border-radius: 2px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .med-info { flex: 1; min-width: 0; }
        .med-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .med-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .med-dosage { color: var(--text-secondary); font-size: 13px; }
        .med-time { color: var(--text-tertiary); font-size: 12px; display: flex; align-items: center; gap: 4px; }
        .med-time svg { width: 12px; height: 12px; }
        .med-tag { font-size: 10px; padding: 3px 8px; border-radius: var(--radius-full); background: var(--bg-surface-hover); color: var(--text-tertiary); font-weight: 500; }

        /* Search & Filter */
        .search-bar { margin-bottom: 12px; }
        .search-input { width: 100%; padding: 14px 16px; background: var(--bg-surface); border: 1px solid var(--border-medium); border-radius: var(--radius-lg); color: var(--text-primary); font-size: 16px; }
        .search-input:focus { outline: none; border-color: var(--accent-green); }
        .search-input::placeholder { color: var(--text-tertiary); }
        
        .filter-chips { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-chip { padding: 10px 16px; background: var(--bg-surface); border: 1px solid var(--border-medium); border-radius: var(--radius-full); color: var(--text-secondary); font-size: 14px; font-family: inherit; cursor: pointer; transition: all var(--transition-base); }
        .filter-chip:hover { border-color: var(--accent-green); }
        .filter-chip.active { background: var(--accent-green); color: white; border-color: var(--accent-green); }

        .med-check {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-green);
            color: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(126,184,154,0.4);
            transition: all var(--transition-base);
        }
        .med-check:hover { transform: scale(1.1); }
        .med-check:active { transform: scale(0.95); }
        .med-check svg { width: 18px; height: 18px; }

        .med-btn {
            padding: 10px 18px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            font-family: inherit;
            border: 2px solid var(--accent-green);
            background: var(--accent-green);
            color: var(--bg-primary);
            flex-shrink: 0;
        }
        .med-btn:hover { background: #8ec4a5; transform: scale(1.02); }
        .med-btn:active { transform: scale(0.98); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent-green-dim), var(--accent-blue-dim));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-green);
            box-shadow: var(--shadow-md);
        }
        .empty-icon svg { width: 36px; height: 36px; }
        .empty-title { font-family: 'Instrument Serif', serif; font-size: 20px; margin-bottom: 8px; color: var(--text-primary); }
        .empty-text { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }

        /* List Item */
        .list-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s ease;
        }
        .list-item:hover { background: var(--bg-surface-hover); }
        .list-item-info { flex: 1; min-width: 0; }
        .list-item-title { font-weight: 600; font-size: 16px; }
        .list-item-sub { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }
        .list-item-chips { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .chip { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-full); background: var(--bg-surface-hover); color: var(--text-secondary); }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 10px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }
        .icon-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
        .icon-btn svg { width: 20px; height: 20px; }

        /* Contact Card */
        .contact-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }
        .contact-card:hover { background: var(--bg-surface-hover); }
        .contact-role { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px; }
        .contact-name { font-size: 18px; font-weight: 600; }
        .contact-phone { color: var(--text-secondary); margin-top: 2px; font-size: 15px; }
        .contact-actions { display: flex; gap: 10px; margin-top: 16px; }
        .contact-btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .contact-btn.call { background: var(--accent-green); border: none; color: var(--bg-primary); }
        .contact-btn.call:hover { background: #8ec4a5; }
        .contact-btn.edit { background: transparent; border: 1px solid var(--border-medium); color: var(--text-secondary); }
        .contact-btn.edit:hover { background: var(--bg-surface-hover); }
        .contact-btn svg { width: 18px; height: 18px; }

        /* Chart */
        .chart-card {
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .chart-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
        .chart-legend { display: flex; gap: 10px; font-size: 10px; color: var(--text-tertiary); }
        .legend-dot { width: 6px; height: 6px; border-radius: 2px; margin-right: 4px; display: inline-block; }
        .bar-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 80px; gap: 8px; }
        .bar-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .bar { width: 100%; max-width: 28px; border-radius: 4px 4px 0 0; transition: height 0.5s ease; }
        .bar-label { font-size: 10px; color: var(--text-tertiary); }

        /* History */
        .history-list {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .history-header { padding: 14px 16px; border-bottom: 1px solid var(--border-subtle); font-size: 12px; color: var(--text-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .history-item { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 12px; transition: background var(--transition-fast); }
        .history-item:last-child { border-bottom: none; }
        .history-item:hover { background: var(--bg-surface-hover); }
        .history-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .history-icon.taken { background: var(--accent-green); color: var(--bg-primary); }
        .history-icon.missed { background: var(--accent-rose-dim); color: var(--accent-rose); }
        .history-icon svg { width: 14px; height: 14px; }
        .history-info { flex: 1; }
        .history-name { font-size: 14px; font-weight: 500; }
        .history-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
        .history-date { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 12px; left: 20px; right: 20px;
            background: rgba(10,15,30,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-full);
            display: flex;
            justify-content: space-around;
            padding: 6px 8px;
            z-index: 100;
            box-shadow: var(--shadow-lg), 0 0 40px rgba(0,0,0,0.3);
        }

        [data-theme="light"] .bottom-nav {
            background: rgba(255,255,255,0.95);
            box-shadow: var(--shadow-md);
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 16px;
            position: relative;
            font-family: inherit;
            transition: all var(--transition-base);
            min-width: 56px;
            border-radius: var(--radius-full);
        }

        .nav-btn svg { width: 22px; height: 22px; transition: transform var(--transition-fast); }
        .nav-btn.active { color: var(--accent-green); }
        .nav-btn.active svg { transform: scale(1.1); }
        .nav-btn:hover:not(.active) { color: var(--text-secondary); }
        .nav-btn:active { transform: scale(0.92); }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--accent-green);
            border-radius: 50%;
        }

        /* Tutorial Modal */
        .tutorial-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);

            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.4s ease;
            pointer-events: auto;

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .tutorial-modal {
            background: var(--bg-primary);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-xl);
            padding: 32px 28px;

        .tutorial-icon {
            width: 72px;

            background: linear-gradient(135deg, var(--accent-green) 0%, var(--accent-teal) 100%);

            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(126,184,154,0.3);

        .tutorial-icon svg { width: 36px; height: 36px; stroke: white; }

        .tutorial-title {
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 10px;

        .tutorial-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 28px;

        .tutorial-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 32px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-base);

        }

        .tutorial-btn:hover { 
            background: #6aab8a; 
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(126,184,154,0.4);

        .tutorial-btn.secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-medium);
            font-size: 16px;
            padding: 14px 24px;
        }

        .tutorial-btn.secondary:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        .tutorial-skip {
            display: block;
            margin-top: 16px;
            color: var(--text-tertiary);
            font-size: 14px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }

        .tutorial-skip:hover { color: var(--text-secondary); }

        .tutorial-checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            color: var(--text-tertiary);
            font-size: 14px;
            cursor: pointer;
        }

        .tutorial-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-green);
        }

        /* Tutorial Tour */
        .tutorial-tour-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9998;
            pointer-events: auto;
        }

        .tutorial-spotlight {
            position: absolute;
            border: 3px solid var(--accent-green);
            border-radius: var(--radius-lg);
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.6), 0 0 30px var(--accent-green);
            pointer-events: none;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 9999px rgba(0,0,0,0.6), 0 0 30px var(--accent-green); }
            50% { box-shadow: 0 0 0 9999px rgba(0,0,0,0.6), 0 0 50px var(--accent-green); }

        .tour-card {
            position: absolute;

        .tour-card-title {

            color: var(--text-primary);

        .tour-card-desc {
            font-size: 17px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .tour-nav {
            display: flex;
            gap: 12px;
        }

        .tour-btn {
            flex: 1;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .tour-btn.primary {
            background: var(--accent-green);
            color: white;
            border: none;
        }

        .tour-btn.primary:hover { background: #6aab8a; }

        .tour-btn.secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-medium);
        }

        .tour-btn.secondary:hover { background: var(--bg-surface); }

        .tour-progress {
            display: flex;
            justify-content: center;
            gap: 6px;

        }

        .tour-dot {
            width: 8px;

            border-radius: 50%;
            background: var(--border-medium);
            transition: all var(--transition-base);
        }

        .tour-dot.active {
            background: var(--accent-green);
            width: 20px;
            border-radius: 4px;
        }

        /* AI Companion Tab - Senior Friendly */
        .companion-welcome {
            text-align: center;
            padding: 32px 20px;
            background: linear-gradient(135deg, var(--accent-purple-dim) 0%, var(--bg-surface) 100%);
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            border: 1px solid var(--border-subtle);
        }

        .companion-avatar {
            width: 80px;

            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(155,141,196,0.3);

        .companion-avatar svg { stroke: white; }

        .companion-greeting {
            font-family: 'Instrument Serif', serif;

            color: var(--text-primary);

        }

        .companion-desc {
            font-size: 16px;
            color: var(--text-secondary);

        .companion-suggestions {
            margin-bottom: 24px;

        .suggestions-label {
            font-size: 15px;

        .suggestion-chips {

        .suggestion-chip {
            padding: 12px 18px;
            background: var(--bg-surface);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-base);

        .suggestion-chip:hover {

        .companion-input-section {
            margin-bottom: 24px;

        .companion-input-row {

            padding: 16px 20px;

            background: var(--accent-green-dim);

        .wake-word-hint {

        /* FAB */
        .fab {

            height: 54px;

        .fab svg { width: 24px; height: 24px; }

            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sheet-overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10,15,30,0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);

            justify-content: space-around;

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: var(--text-tertiary);

            position: relative;
            font-family: inherit;
            transition: color 0.2s ease;

        .nav-btn.active { color: var(--text-primary); }

        .nav-btn::after {
            content: '';

            bottom: 2px;

            bottom: 96px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;

        .fab svg { width: 26px; height: 26px; }

        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sheet-overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {

            bottom: 0; left: 0; right: 0;

            backdrop-filter: blur(24px);

        [data-theme="light"] .bottom-sheet {
            background: rgba(245,243,240,0.98);
        }

        .bottom-sheet.active { transform: translateY(0); }

        .sheet-handle {
            width: 36px;
            height: 4px;

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);

            font-family: inherit;
            transition: all var(--transition-fast);
        }
        .form-input:focus { outline: none; border-color: var(--accent-green); background: var(--bg-surface-hover); }
        .form-input::placeholder { color: var(--text-tertiary); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .color-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
        .swatch {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s ease;

        .swatch:hover { transform: scale(1.1); }
        .swatch.selected { border-color: var(--text-primary); transform: scale(1.05); }
        .swatch-blue { background: var(--accent-blue); }
        .swatch-green { background: var(--accent-green); }
        .swatch-amber { background: var(--accent-amber); }
        .swatch-rose { background: var(--accent-rose); }
        .swatch-purple { background: var(--accent-purple); }
        .swatch-teal { background: var(--accent-teal); }

        .times-list { display: flex; flex-direction: column; gap: 8px; }
        .time-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            transition: border-color 0.2s ease;
        }
        .time-row:focus-within { border-color: var(--accent-green); }
        .time-row input { flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 16px; font-family: inherit; }
        .time-row input:focus { outline: none; }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px dashed var(--border-medium);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            font-family: inherit;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .add-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }
        .add-btn svg { width: 18px; height: 18px; }

        .food-btns { display: flex; gap: 8px; }
        .food-btn {
            flex: 1;
            padding: 12px 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .food-btn.selected { border-color: var(--accent-green); background: var(--accent-green-dim); color: var(--accent-green); }

        textarea.form-input { min-height: 80px; resize: vertical; }

        /* Buttons */
        .btn {
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            font-family: inherit;
            border: none;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn svg { width: 16px; height: 16px; }
        .btn-primary { background: var(--accent-green); color: var(--bg-primary); }
        .btn-primary:hover { background: #8ec4a5; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-outline { background: transparent; border: 1px solid var(--border-medium); color: var(--text-secondary); }
        .btn-outline:hover { background: var(--bg-surface-hover); }
        .btn-danger { background: var(--accent-rose-dim); border: 1px solid var(--accent-rose); color: var(--accent-rose); margin-top: 12px; }
        .btn-danger:hover { background: var(--accent-rose); color: white; }
        .btn-purple { background: var(--accent-purple); color: white; }
        .btn-purple:hover { background: #a894d4; }

        /* Toast - TOP POSITION */
        .toast {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            background: rgba(10,15,30,0.95);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 95;
            transform: translateY(-120%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow-lg);
        }

        [data-theme="light"] .toast {
            background: rgba(255,255,255,0.95);
        }

        .toast.show { transform: translateY(0); }
        .toast-msg { font-size: 14px; }
        .toast-undo { background: transparent; border: none; color: var(--accent-green); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 4px 8px; transition: opacity var(--transition-fast); }
        .toast-undo:hover { opacity: 0.8; }

        /* High Contrast Mode */
        [data-high-contrast="true"] {
            --bg-primary: #000000 !important;
            --bg-surface: #1a1a1a !important;
            --text-primary: #ffffff !important;
            --text-secondary: #ffff00 !important;
            --text-tertiary: #cccccc !important;
            --border-subtle: #ffffff !important;
            --border-medium: #ffffff !important;
        }
        
        [data-high-contrast="true"] .header,
        [data-high-contrast="true"] .bottom-nav,
        [data-high-contrast="true"] .bottom-sheet {
            background: #000 !important;
            border-color: #fff !important;
        }
        
        [data-high-contrast="true"] .fab {
            background: #ffff00 !important;
            color: #000 !important;
        }

        /* Settings Section */
        .settings-section {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
        }

        .settings-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--accent-purple);
            font-weight: 500;
            margin-bottom: 16px;
        }

        .settings-title svg { width: 18px; height: 18px; }

        .api-key-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .api-key-input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        .api-provider {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 12px;
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .api-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .api-status-dot.connected { background: var(--accent-green); }
        .api-status-dot.disconnected { background: var(--accent-rose); }

        /* Settings Panel */
        .settings-group {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .settings-group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-subtle);
        }

        .settings-group-header svg { width: 16px; height: 16px; opacity: 0.7; }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .settings-row:last-child { border-bottom: none; }

        .settings-label {
            font-size: 15px;
            color: var(--text-primary);
        }

        .settings-desc {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        /* Toggle Switch */
        .toggle {
            position: relative;
            width: 50px;
            height: 28px;
            flex-shrink: 0;
        }

        .toggle input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border-medium);
            border-radius: var(--radius-full);
            transition: 0.3s;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle input:checked + .toggle-slider { background: var(--accent-green); }
        .toggle input:checked + .toggle-slider:before { transform: translateX(22px); }

        /* Select Dropdown */
        .settings-select {
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;

        .settings-select:focus { outline: none; border-color: var(--accent-green); }

        .settings-btn {

            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);

            font-family: inherit;

            font-family: inherit;

            height: 40px;
            border-radius: 50%;

            justify-content: center;

            color: var(--accent-rose);

            align-items: center;
            justify-content: center;
            cursor: pointer;

        .contact-delete-btn svg { width: 16px; height: 16px; }

        .add-contact-btn {

            display: flex;
            align-items: center;

        .contact-form { display: flex; flex-direction: column; gap: 16px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
        }

        .form-input:focus { outline: none; border-color: var(--accent-green); }
        .form-input::placeholder { color: var(--text-tertiary); }

        /* About Section */
        .about-section {
            text-align: center;
            padding: 24px 16px;
        }

        .about-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent-green), #5a9a7a);

            justify-content: center;

        .about-name {

            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .about-version {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* Version Tag */
        .version-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-full);
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 12px;
        }

        // Three.js - Soft Glowing Orbs
        function ThreeBackground() {
            const canvasRef = useRef(null);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const orbs = [];
                const colors = [0xffffff, 0x7eb89a, 0x7aa3c8, 0x9b8dc4];
                
                for (let i = 0; i < 45; i++) {
                    const size = 2 + Math.random() * 3;
                    const geometry = new THREE.SphereGeometry(size, 16, 16);
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const opacity = 0.15 + Math.random() * 0.15;
                    
                    const material = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
                    
                    const orb = new THREE.Mesh(geometry, material);
                    orb.position.set((Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 15);
                    orb.userData.vel = { x: (Math.random() - 0.5) * 0.002, y: (Math.random() - 0.5) * 0.002 };
                    scene.add(orb);
                    orbs.push(orb);

                    const glowGeom = new THREE.SphereGeometry(size * 2.5, 16, 16);
                    const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: opacity * 0.3 });
                    const glow = new THREE.Mesh(glowGeom, glowMat);
                    glow.position.copy(orb.position);
                    glow.userData.vel = orb.userData.vel;
                    scene.add(glow);
                    orbs.push(glow);
                }

                camera.position.z = 20;
                let animating = true;

                const animate = () => {
                    if (!animating) return;
                    requestAnimationFrame(animate);
                    for (let i = 0; i < orbs.length; i += 2) {
                        const orb = orbs[i];
                        orb.position.x += orb.userData.vel.x;
                        orb.position.y += orb.userData.vel.y;
                        orbs[i + 1].position.copy(orb.position);
                        if (Math.abs(orb.position.x) > 25) orb.userData.vel.x *= -1;
                        if (Math.abs(orb.position.y) > 25) orb.userData.vel.y *= -1;
                    }
                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    animating = false;
                    window.removeEventListener('resize', handleResize);
                    renderer.dispose();
                };
            }, []);

            return <canvas ref={canvasRef} id="three-bg" />;
        }
