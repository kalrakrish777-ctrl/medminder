<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f1e">
    <meta name="description" content="MedMinder - Your calming medication companion">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MedMinder</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-surface: rgba(255,255,255,0.04);
            --bg-surface-hover: rgba(255,255,255,0.07);
            --border-subtle: rgba(255,255,255,0.08);
            --border-medium: rgba(255,255,255,0.14);
            --text-primary: #f0ede8;
            --text-secondary: rgba(240,237,232,0.55);
            --text-tertiary: rgba(240,237,232,0.3);
            --accent-green: #7eb89a;
            --accent-amber: #e8a97e;
            --accent-rose: #c97b84;
            --accent-blue: #7aa3c8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-primary);
            -webkit-font-smoothing: antialiased;
        }

        #root { height: 100%; display: flex; flex-direction: column; }

        #three-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-subtle);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-green);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--bg-primary);
        }

        .logo-text {
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            color: var(--text-primary);
        }

        .tagline {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 100px;
        }

        /* Page Title */
        .page-title {
            font-family: 'Instrument Serif', serif;
            font-size: 32px;
            margin-bottom: 24px;
        }

        /* Cards */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* Progress Ring */
        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 0;
        }

        .progress-ring-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: var(--border-subtle);
            stroke-width: 10;
        }

        .progress-ring-fill {
            fill: none;
            stroke: var(--accent-green);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s ease;
        }

        .progress-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .progress-percent {
            font-family: 'Instrument Serif', serif;
            font-size: 42px;
        }

        .progress-label {
            color: var(--text-tertiary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .progress-summary {
            color: var(--text-secondary);
            margin-top: 16px;
            font-size: 15px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-family: 'Instrument Serif', serif;
            font-size: 32px;
            color: var(--accent-green);
        }

        .stat-label {
            color: var(--text-tertiary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        /* Med Group */
        .med-section {
            margin-bottom: 32px;
        }

        .med-section-title {
            color: var(--text-tertiary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .med-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .med-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 4px 0 0 4px;
        }

        .med-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .med-info { flex: 1; }
        .med-name { font-weight: 600; font-size: 17px; }
        .med-dosage { color: var(--text-secondary); font-size: 14px; }
        .med-time { color: var(--text-tertiary); font-size: 13px; margin-top: 4px; }

        .med-card.done {
            opacity: 0.5;
        }
        .med-card.done .med-name {
            text-decoration: line-through;
            text-decoration-color: var(--text-tertiary);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            border: none;
        }

        .btn-primary {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
        }

        .btn-outline:hover {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* List Items */
        .list-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .list-item-info { flex: 1; }
        .list-item-title { font-weight: 600; font-size: 16px; }
        .list-item-subtitle { color: var(--text-secondary); font-size: 14px; }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
        }
        .icon-btn:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
        }
        .icon-btn svg { width: 20px; height: 20px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 28px;
            z-index: 100;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            font-size: 11px;
            cursor: pointer;
            padding: 8px 16px;
            position: relative;
            font-family: inherit;
            transition: color 0.3s ease;
        }

        .nav-btn.active {
            color: var(--text-primary);
        }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--accent-green);
            border-radius: 2px;
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-green);
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 20px rgba(126, 184, 154, 0.3);
        }
        .fab:hover { transform: scale(1.05); }
        .fab svg { width: 28px; height: 28px; }

        /* Bottom Sheet */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sheet-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg-primary);
            border: 1px solid var(--border-medium);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 40px;
            z-index: 201;
            transform: translateY(100%);
            transition: transform 0.4s ease;
            max-height: 85vh;
            overflow-y: auto;
        }
        .bottom-sheet.active { transform: translateY(0); }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--border-medium);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .sheet-title {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            margin-bottom: 24px;
        }

        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-green);
        }
        .form-input::placeholder { color: var(--text-tertiary); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .color-swatches { display: flex; gap: 12px; flex-wrap: wrap; }
        .swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color 0.3s ease;
        }
        .swatch.selected { border-color: var(--text-primary); }

        .times-list { display: flex; flex-direction: column; gap: 8px; }
        .time-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: var(--bg-surface);
            border-radius: 12px;
        }
        .time-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
        }
        .time-row input:focus { outline: none; }

        .add-time-btn {
            background: transparent;
            border: 1px dashed var(--border-medium);
            color: var(--text-secondary);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-family: inherit;
        }

        .food-btns { display: flex; gap: 8px; }
        .food-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .food-btn.selected {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        textarea.form-input { min-height: 100px; resize: vertical; }

        .btn-full { width: 100%; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border-medium);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 300;
            transform: translateY(150%);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateY(0); }
        .toast-msg { font-size: 14px; }
        .toast-undo {
            background: transparent;
            border: none;
            color: var(--accent-green);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        /* Empty State */
        .empty {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-tertiary);
        }
        .empty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            opacity: 0.4;
        }
        .empty-text { font-size: 15px; }

        /* Contact Card */
        .contact-role {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
        }
        .contact-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .contact-phone { color: var(--text-secondary); margin-bottom: 16px; }
        .contact-actions { display: flex; gap: 12px; }
        .contact-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }
        .contact-btn.call { background: var(--accent-green); border: none; color: var(--bg-primary); }
        .contact-btn.edit { background: transparent; border: 1px solid var(--border-medium); color: var(--text-secondary); }
        .contact-btn svg { width: 18px; height: 18px; }

        /* Bar Chart */
        .chart-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .chart-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
        .bar-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 120px; gap: 8px; }
        .bar-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .bar { width: 100%; max-width: 32px; border-radius: 4px 4px 0 0; transition: height 0.4s ease; }
        .bar-label { font-size: 11px; color: var(--text-tertiary); }

        /* History */
        .history-item {
            padding: 14px 0;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .history-item:last-child { border-bottom: none; }
        .history-icon {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .history-icon.taken { background: rgba(126, 184, 154, 0.2); color: var(--accent-green); }
        .history-icon.missed { background: rgba(201, 123, 132, 0.2); color: var(--accent-rose); }
        .history-info { flex: 1; }
        .history-name { font-size: 14px; font-weight: 500; }
        .history-time { font-size: 12px; color: var(--text-tertiary); }
        .history-date { font-size: 12px; color: var(--text-tertiary); }
    </style>
</head>
<body>
    <div id="root"></div>
    <canvas id="three-bg"></canvas>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icons
        const Icon = ({ name }) => {
            const icons = {
                home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                pill: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>,
                chart: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
                phone: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
                plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
                x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                edit: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
                flame: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>,
                calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
                trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            };
            return icons[name] || null;
        };

        // Three.js Background
        function ThreeBackground() {
            const canvasRef = useRef(null);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const particles = [];
                const geometry = new THREE.SphereGeometry(0.6, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06 });

                for (let i = 0; i < 150; i++) {
                    const particle = new THREE.Mesh(geometry, material);
                    particle.position.set(
                        (Math.random() - 0.5) * 50,
                        (Math.random() - 0.5) * 50,
                        (Math.random() - 0.5) * 20
                    );
                    particle.userData.vel = {
                        x: (Math.random() - 0.5) * 0.003,
                        y: (Math.random() - 0.5) * 0.003
                    };
                    scene.add(particle);
                    particles.push(particle);
                }

                camera.position.z = 15;
                let animating = true;

                const animate = () => {
                    if (!animating) return;
                    requestAnimationFrame(animate);
                    particles.forEach(p => {
                        p.position.x += p.userData.vel.x;
                        p.position.y += p.userData.vel.y;
                        if (Math.abs(p.position.x) > 25) p.userData.vel.x *= -1;
                        if (Math.abs(p.position.y) > 25) p.userData.vel.y *= -1;
                    });
                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    animating = false;
                    window.removeEventListener('resize', handleResize);
                    renderer.dispose();
                };
            }, []);

            return <canvas ref={canvasRef} id="three-bg" />;
        }

        // Helpers
        const getToday = () => new Date().toISOString().split('T')[0];
        const formatDate = () => new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        const getTimeOfDay = (h) => {
            if (h >= 5 && h < 12) return 'morning';
            if (h >= 12 && h < 17) return 'afternoon';
            if (h >= 17 && h < 21) return 'evening';
            return 'night';
        };
        const formatTime = (t) => {
            const [h, m] = t.split(':');
            const hour = parseInt(h);
            return `${hour % 12 || 12}:${m} ${hour >= 12 ? 'PM' : 'AM'}`;
        };

        // Storage
        const storage = {
            get: (k, d) => { try { const v = localStorage.getItem(`mm_${k}`); return v ? JSON.parse(v) : d; } catch { return d; } },
            set: (k, v) => localStorage.setItem(`mm_${k}`, JSON.stringify(v))
        };

        // Main App
        function App() {
            const [page, setPage] = useState('home');
            const [meds, setMeds] = useState([]);
            const [taken, setTaken] = useState({});
            const [history, setHistory] = useState([]);
            const [contacts, setContacts] = useState({ family: {}, doctor: {}, pharmacy: {} });
            const [sheet, setSheet] = useState(null);
            const [toast, setToast] = useState(null);
            const [undoKey, setUndoKey] = useState(null);
            const undoTimer = useRef(null);

            // Load data
            useEffect(() => {
                setMeds(storage.get('meds', []));
                setTaken(storage.get('taken', {}));
                setHistory(storage.get('history', []));
                setContacts(storage.get('contacts', { family: {}, doctor: {}, pharmacy: {} }));
            }, []);

            // Save data
            useEffect(() => { storage.set('meds', meds); }, [meds]);
            useEffect(() => { storage.set('taken', taken); }, [taken]);
            useEffect(() => { storage.set('history', history); }, [history]);
            useEffect(() => { storage.set('contacts', contacts); }, [contacts]);

            // Mark taken
            const markTaken = (medId, time) => {
                const key = `${medId}-${time}`;
                const today = getToday();
                setTaken(prev => ({
                    ...prev,
                    [today]: { ...(prev[today] || {}), [key]: true }
                }));
                const med = meds.find(m => m.id === medId);
                if (med) {
                    setHistory(prev => [{
                        id: Date.now(),
                        name: med.name,
                        time,
                        date: today,
                        action: 'taken'
                    }, ...prev].slice(0, 100));
                }
                clearTimeout(undoTimer.current);
                setToast(`${med?.name} marked as taken`);
                setUndoKey(key);
                undoTimer.current = setTimeout(() => {
                    setToast(null);
                    setUndoKey(null);
                }, 5000);
            };

            // Undo
            const undoTaken = () => {
                const today = getToday();
                setTaken(prev => {
                    const day = { ...(prev[today] || {}) };
                    delete day[undoKey];
                    return { ...prev, [today]: day };
                });
                setHistory(prev => prev.filter(h => !(h.date === today)));
                setToast(null);
                setUndoKey(null);
            };

            // Delete med
            const deleteMed = (id) => {
                if (confirm('Remove this medication?')) {
                    setMeds(prev => prev.filter(m => m.id !== id));
                }
            };

            // Get today's stats
            const today = getToday();
            const todayMeds = meds.flatMap(m => m.times.map(t => ({ ...m, currentTime: t })));
            const takenToday = Object.keys(taken[today] || {}).length;
            const totalToday = todayMeds.length;
            const percent = totalToday > 0 ? Math.round((takenToday / totalToday) * 100) : 0;

            // Group meds
            const groupMeds = () => {
                const groups = { morning: [], afternoon: [], evening: [], night: [] };
                meds.forEach(m => {
                    m.times.forEach(t => {
                        const h = parseInt(t.split(':')[0]);
                        groups[getTimeOfDay(h)].push({ ...m, currentTime: t });
                    });
                });
                return groups;
            };

            // Weekly data
            const getWeeklyData = () => {
                const days = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    const total = meds.flatMap(m => m.times).length;
                    const done = Object.keys(taken[ds] || {}).length;
                    days.push({
                        label: d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 2),
                        rate: total > 0 ? Math.round((done / total) * 100) : 0
                    });
                }
                return days;
            };

            // Render pages
            const renderHome = () => (
                <div>
                    <h2 className="page-title">{formatDate()}</h2>
                    <p style={{ color: 'var(--text-secondary)', marginBottom: '24px' }}>
                        {takenToday} of {totalToday} medications taken
                    </p>

                    <div className="card">
                        <div className="progress-container">
                            <div className="progress-ring-wrapper">
                                <svg className="progress-ring" width="180" height="180">
                                    <circle className="progress-ring-bg" cx="90" cy="90" r="75" />
                                    <circle
                                        className="progress-ring-fill"
                                        cx="90" cy="90" r="75"
                                        strokeDasharray={`${2 * Math.PI * 75}`}
                                        strokeDashoffset={`${2 * Math.PI * 75 * (1 - percent / 100)}`}
                                    />
                                </svg>
                                <div className="progress-center">
                                    <div className="progress-percent">{percent}%</div>
                                    <div className="progress-label">Today</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {Object.entries(groupMeds()).map(([period, items]) => 
                        items.length > 0 && (
                            <div className="med-section" key={period}>
                                <div className="med-section-title">{period}</div>
                                {items.map(med => {
                                    const key = `${med.id}-${med.currentTime}`;
                                    const isTaken = taken[today]?.[key];
                                    return (
                                        <div className={`med-card ${isTaken ? 'done' : ''}`} key={key}>
                                            <div className="med-color-dot" style={{ background: `var(--accent-${med.color || 'blue'})` }} />
                                            <div className="med-info">
                                                <div className="med-name">{med.name}</div>
                                                <div className="med-dosage">{med.dosage}</div>
                                                <div className="med-time">{formatTime(med.currentTime)}</div>
                                            </div>
                                            <button className="btn btn-outline btn-small" onClick={() => !isTaken && markTaken(med.id, med.currentTime)}>
                                                {isTaken ? <Icon name="check" /> : 'Take'}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    )}

                    {meds.length === 0 && (
                        <div className="empty">
                            <div className="empty-icon"><Icon name="pill" /></div>
                            <p className="empty-text">No medications yet. Add your first one.</p>
                        </div>
                    )}

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-value">0</div>
                            <div className="stat-label">Day Streak</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">{percent}%</div>
                            <div className="stat-label">This Week</div>
                        </div>
                    </div>
                </div>
            );

            const renderMeds = () => (
                <div>
                    <h2 className="page-title">Medications</h2>
                    
                    {meds.length === 0 ? (
                        <div className="empty">
                            <div className="empty-icon"><Icon name="pill" /></div>
                            <p className="empty-text">No medications added yet</p>
                        </div>
                    ) : (
                        meds.map(med => (
                            <div className="list-item" key={med.id}>
                                <div className="med-color-dot" style={{ background: `var(--accent-${med.color || 'blue'})`, width: '8px', height: '40px', borderRadius: '4px' }} />
                                <div className="list-item-info">
                                    <div className="list-item-title">{med.name}</div>
                                    <div className="list-item-subtitle">{med.dosage}</div>
                                </div>
                                <button className="icon-btn" onClick={() => setSheet({ type: 'edit', med })}>
                                    <Icon name="edit" />
                                </button>
                            </div>
                        ))
                    )}
                </div>
            );

            const renderProgress = () => (
                <div>
                    <h2 className="page-title">Progress</h2>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-value">0</div>
                            <div className="stat-label">Day Streak</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">{percent}%</div>
                            <div className="stat-label">This Week</div>
                        </div>
                    </div>

                    <div className="chart-card" style={{ marginTop: '24px' }}>
                        <div className="chart-title">Weekly Overview</div>
                        <div className="bar-chart">
                            {getWeeklyData().map((d, i) => (
                                <div className="bar-day" key={i}>
                                    <div className="bar" style={{
                                        height: `${Math.max(d.rate, 5)}%`,
                                        background: d.rate >= 80 ? 'var(--accent-green)' : d.rate >= 60 ? 'var(--accent-amber)' : 'var(--accent-rose)'
                                    }} />
                                    <div className="bar-label">{d.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <h3 style={{ fontSize: '14px', color: 'var(--text-secondary)', marginBottom: '16px' }}>Recent History</h3>
                    {history.slice(0, 20).map(h => (
                        <div className="history-item" key={h.id}>
                            <div className={`history-icon ${h.action}`}>
                                <Icon name={h.action === 'taken' ? 'check' : 'x'} />
                            </div>
                            <div className="history-info">
                                <div className="history-name">{h.name}</div>
                                <div className="history-time">{formatTime(h.time)}</div>
                            </div>
                            <div className="history-date">{new Date(h.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                        </div>
                    ))}
                    {history.length === 0 && <div className="empty"><p className="empty-text">No history yet</p></div>}
                </div>
            );

            const renderContacts = () => (
                <div>
                    <h2 className="page-title">Contacts</h2>
                    
                    {['family', 'doctor', 'pharmacy'].map(role => (
                        <div className="card" key={role}>
                            <div className="contact-role">{role}</div>
                            <div className="contact-name">{contacts[role]?.name || 'Not set'}</div>
                            <div className="contact-phone">{contacts[role]?.phone || 'Tap edit to add'}</div>
                            <div className="contact-actions">
                                <button className="contact-btn call" onClick={() => {
                                    const phone = contacts[role]?.phone;
                                    if (phone) window.location.href = `tel:${phone.replace(/\D/g, '')}`;
                                }}>
                                    <Icon name="phone" /> Call
                                </button>
                                <button className="contact-btn edit" onClick={() => setSheet({ type: 'contact', role })}>
                                    <Icon name="edit" /> Edit
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="app">
                    <ThreeBackground />
                    
                    <header className="header">
                        <div className="logo">
                            <div className="logo-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
                                    <path d="m8.5 8.5 7 7"/>
                                </svg>
                            </div>
                            <span className="logo-text">MedMinder</span>
                        </div>
                        <p className="tagline">Your calming medication companion</p>
                    </header>

                    <main className="content">
                        {page === 'home' && renderHome()}
                        {page === 'meds' && renderMeds()}
                        {page === 'progress' && renderProgress()}
                        {page === 'contacts' && renderContacts()}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="bottom-nav">
                        <button className={`nav-btn ${page === 'home' ? 'active' : ''}`} onClick={() => setPage('home')}>
                            <Icon name="home" /> Home
                        </button>
                        <button className={`nav-btn ${page === 'meds' ? 'active' : ''}`} onClick={() => setPage('meds')}>
                            <Icon name="pill" /> Meds
                        </button>
                        <button className={`nav-btn ${page === 'progress' ? 'active' : ''}`} onClick={() => setPage('progress')}>
                            <Icon name="chart" /> Progress
                        </button>
                        <button className={`nav-btn ${page === 'contacts' ? 'active' : ''}`} onClick={() => setPage('contacts')}>
                            <Icon name="phone" /> Contacts
                        </button>
                    </nav>

                    {/* FAB */}
                    <button className="fab" onClick={() => setSheet({ type: 'add' })}>
                        <Icon name="plus" />
                    </button>

                    {/* Bottom Sheet */}
                    <div className={`sheet-overlay ${sheet ? 'active' : ''}`} onClick={() => setSheet(null)} />
                    <div className={`bottom-sheet ${sheet ? 'active' : ''}`}>
                        <div className="sheet-handle" />
                        <h3 className="sheet-title">{sheet?.type === 'add' ? 'Add Medication' : sheet?.type === 'edit' ? 'Edit Medication' : 'Edit Contact'}</h3>
                        
                        {(sheet?.type === 'add' || sheet?.type === 'edit') && (
                            <MedForm
                                med={sheet?.type === 'edit' ? sheet.med : null}
                                onSave={(data) => {
                                    if (sheet?.type === 'edit') {
                                        setMeds(prev => prev.map(m => m.id === sheet.med.id ? { ...m, ...data } : m));
                                    } else {
                                        setMeds(prev => [...prev, { ...data, id: Date.now().toString() }]);
                                    }
                                    setSheet(null);
                                }}
                                onDelete={sheet?.type === 'edit' ? () => { deleteMed(sheet.med.id); setSheet(null); } : null}
                            />
                        )}
                        
                        {sheet?.type === 'contact' && (
                            <ContactForm
                                role={sheet.role}
                                data={contacts[sheet.role]}
                                onSave={(data) => {
                                    setContacts(prev => ({ ...prev, [sheet.role]: data }));
                                    setSheet(null);
                                }}
                                onCancel={() => setSheet(null)}
                            />
                        )}
                    </div>

                    {/* Toast */}
                    <div className={`toast ${toast ? 'show' : ''}`}>
                        <span className="toast-msg">{toast}</span>
                        <button className="toast-undo" onClick={undoTaken}>Undo</button>
                    </div>
                </div>
            );
        }

        // Med Form
        function MedForm({ med, onSave, onDelete }) {
            const [form, setForm] = useState({
                name: med?.name || '',
                dosage: med?.dosage || '',
                color: med?.color || 'blue',
                times: med?.times || ['08:00'],
                food: med?.food || 'none',
                notes: med?.notes || ''
            });

            return (
                <form onSubmit={(e) => { e.preventDefault(); onSave(form); }}>
                    <div className="form-group">
                        <label className="form-label">Name</label>
                        <input className="form-input" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="e.g., Aspirin" required />
                    </div>

                    <div className="form-row">
                        <div className="form-group">
                            <label className="form-label">Dosage</label>
                            <input className="form-input" value={form.dosage} onChange={e => setForm(f => ({ ...f, dosage: e.target.value }))} placeholder="e.g., 100mg" />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Color</label>
                            <div className="color-swatches">
                                {['blue', 'green', 'amber', 'rose', 'purple', 'teal'].map(c => (
                                    <div key={c} className={`swatch swatch-${c} ${form.color === c ? 'selected' : ''}`} onClick={() => setForm(f => ({ ...f, color: c }))} />
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="form-group">
                        <label className="form-label">Times</label>
                        <div className="times-list">
                            {form.times.map((t, i) => (
                                <div className="time-row" key={i}>
                                    <input type="time" value={t} onChange={e => {
                                        const times = [...form.times];
                                        times[i] = e.target.value;
                                        setForm(f => ({ ...f, times }));
                                    }} />
                                    {form.times.length > 1 && <button type="button" className="icon-btn" onClick={() => setForm(f => ({ ...f, times: f.times.filter((_, j) => j !== i) }))}><Icon name="x" /></button>}
                                </div>
                            ))}
                        </div>
                        {form.times.length < 6 && <button type="button" className="add-time-btn" onClick={() => setForm(f => ({ ...f, times: [...f.times, '12:00'] }))}>+ Add time</button>}
                    </div>

                    <div className="form-group">
                        <label className="form-label">Take with food</label>
                        <div className="food-btns">
                            {[['none', 'Any'], ['with', 'With food'], ['empty', 'Empty']].map(([v, l]) => (
                                <button key={v} type="button" className={`food-btn ${form.food === v ? 'selected' : ''}`} onClick={() => setForm(f => ({ ...f, food: v }))}>{l}</button>
                            ))}
                        </div>
                    </div>

                    <div className="form-group">
                        <label className="form-label">Notes</label>
                        <textarea className="form-input" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Optional notes..." />
                    </div>

                    <button type="submit" className="btn btn-primary btn-full">{med ? 'Save Changes' : 'Add Medication'}</button>
                    {onDelete && <button type="button" className="btn btn-outline btn-full" style={{ marginTop: '12px', color: 'var(--accent-rose)', borderColor: 'var(--accent-rose)' }} onClick={onDelete}>Delete Medication</button>}
                </form>
            );
        }

        // Contact Form
        function ContactForm({ role, data, onSave, onCancel }) {
            const [name, setName] = useState(data?.name || '');
            const [phone, setPhone] = useState(data?.phone || '');
            
            return (
                <form onSubmit={(e) => { e.preventDefault(); onSave({ name, phone }); }}>
                    <div className="form-group">
                        <label className="form-label">Name</label>
                        <input className="form-input" value={name} onChange={e => setName(e.target.value)} placeholder="Contact name" />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Phone</label>
                        <input className="form-input" type="tel" value={phone} onChange={e => setPhone(e.target.value)} placeholder="Phone number" />
                    </div>
                    <div style={{ display: 'flex', gap: '12px' }}>
                        <button type="button" className="btn btn-outline" style={{ flex: 1 }} onClick={onCancel}>Cancel</button>
                        <button type="submit" className="btn btn-primary" style={{ flex: 1 }}>Save</button>
                    </div>
                </form>
            );
        }

        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
