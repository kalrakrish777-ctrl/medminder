<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f1e">
    <meta name="description" content="MedMinder - Your calming medication companion with AI">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MedMinder</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-surface: rgba(255,255,255,0.05);
            --bg-surface-hover: rgba(255,255,255,0.08);
            --border-subtle: rgba(255,255,255,0.08);
            --border-medium: rgba(255,255,255,0.15);
            --text-primary: #f0ede8;
            --text-secondary: rgba(240,237,232,0.6);
            --text-tertiary: rgba(240,237,232,0.35);
            --accent-green: #7eb89a;
            --accent-green-dim: rgba(126,184,154,0.15);
            --accent-amber: #e8a97e;
            --accent-amber-dim: rgba(232,169,126,0.12);
            --accent-rose: #c97b84;
            --accent-rose-dim: rgba(201,123,132,0.12);
            --accent-blue: #7aa3c8;
            --accent-blue-dim: rgba(122,163,200,0.12);
            --accent-purple: #9b8dc4;
            --accent-teal: #6bb3b3;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-full: 999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--bg-primary);
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

        #root { height: 100%; display: flex; flex-direction: column; }

        #three-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-green), #5a9a7a);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(126,184,154,0.3);
        }

        .logo-icon svg { width: 22px; height: 22px; stroke: var(--bg-primary); }

        .logo-text {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            letter-spacing: -0.01em;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .header-btn:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
        }

        .header-btn svg { width: 20px; height: 20px; }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 120px;
        }

        /* Page Transitions */
        .page {
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Page Header */
        .page-header { margin-bottom: 24px; }
        .page-title {
            font-family: 'Instrument Serif', serif;
            font-size: 26px;
            margin-bottom: 4px;
            animation: slideUp 0.4s ease forwards;
        }
        .page-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            animation: slideUp 0.4s ease forwards;
            animation-delay: 0.05s;
            opacity: 0;
        }

        /* AI Chat Input */
        .ai-input-container {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 24px;
            animation: slideUp 0.4s ease forwards;
            animation-delay: 0.08s;
            opacity: 0;
        }

        .ai-input-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--accent-purple);
            font-size: 13px;
            font-weight: 500;
        }

        .ai-input-header svg { width: 16px; height: 16px; }

        .ai-input-row {
            display: flex;
            gap: 10px;
        }

        .ai-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 120px;
        }

        .ai-input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        .ai-input::placeholder { color: var(--text-tertiary); }

        .ai-send-btn {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            background: var(--accent-purple);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .ai-send-btn:hover { background: #a894d4; }
        .ai-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .ai-send-btn svg { width: 20px; height: 20px; }

        .ai-typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .ai-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-purple);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .ai-dot:nth-child(2) { animation-delay: 0.2s; }
        .ai-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* AI Response */
        .ai-response {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 24px;
            animation: slideUp 0.3s ease;
        }

        .ai-response-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .ai-response-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-green);
            font-size: 13px;
            font-weight: 500;
        }

        .ai-response-label svg { width: 16px; height: 16px; }

        .ai-response-time {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .ai-response-content {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .ai-response-content strong { color: var(--text-primary); }

        .ai-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--accent-green-dim);
            border: 1px solid var(--accent-green);
            border-radius: var(--radius-full);
            color: var(--accent-green);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .ai-action-btn:hover { background: var(--accent-green); color: var(--bg-primary); }
        .ai-action-btn svg { width: 14px; height: 14px; }

        /* Progress Card */
        .progress-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            animation: slideUp 0.4s ease forwards;
            animation-delay: 0.1s;
            opacity: 0;
        }

        .progress-row {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .progress-ring-wrap {
            position: relative;
            width: 90px;
            height: 90px;
            flex-shrink: 0;
        }

        .progress-ring { transform: rotate(-90deg); }
        .progress-ring-bg { fill: none; stroke: var(--border-subtle); stroke-width: 8; }
        .progress-ring-fill {
            fill: none;
            stroke: var(--accent-green);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.8s ease;
        }
        .progress-ring-fill.low { stroke: var(--accent-amber); }
        .progress-ring-fill.critical { stroke: var(--accent-rose); }

        .progress-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .progress-percent {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            line-height: 1;
        }

        .progress-label {
            font-size: 9px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 2px;
        }

        .progress-info { flex: 1; }
        .progress-done {
            font-family: 'Instrument Serif', serif;
            font-size: 32px;
            line-height: 1;
            color: var(--text-primary);
        }
        .progress-done span {
            font-size: 18px;
            color: var(--text-tertiary);
            font-family: 'DM Sans', sans-serif;
        }
        .progress-msg { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px;
            text-align: center;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            margin: 0 auto 8px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.flame { background: var(--accent-amber-dim); color: var(--accent-amber); }
        .stat-icon.rate { background: var(--accent-green-dim); color: var(--accent-green); }
        .stat-icon.total { background: var(--accent-blue-dim); color: var(--accent-blue); }
        .stat-icon svg { width: 18px; height: 18px; }

        .stat-value {
            font-family: 'Instrument Serif', serif;
            font-size: 22px;
            line-height: 1.1;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 4px;
        }

        /* Med Section */
        .med-section { margin-bottom: 28px; }

        .med-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-tertiary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .med-section-title svg { width: 14px; height: 14px; }

        /* Med Card */
        .med-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .med-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
        }

        .med-card[data-color="blue"]::before { background: var(--accent-blue); }
        .med-card[data-color="green"]::before { background: var(--accent-green); }
        .med-card[data-color="amber"]::before { background: var(--accent-amber); }
        .med-card[data-color="rose"]::before { background: var(--accent-rose); }
        .med-card[data-color="purple"]::before { background: var(--accent-purple); }
        .med-card[data-color="teal"]::before { background: var(--accent-teal); }

        .med-card:hover { background: var(--bg-surface-hover); transform: translateX(4px); }
        .med-card.done { opacity: 0.45; }
        .med-card.done .med-name { text-decoration: line-through; text-decoration-color: var(--text-tertiary); }

        .med-color-bar {
            width: 8px;
            height: 44px;
            border-radius: 4px;
            flex-shrink: 0;
            margin-left: 6px;
        }

        .med-info { flex: 1; min-width: 0; }
        .med-name { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .med-meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
        .med-dosage { color: var(--text-secondary); font-size: 14px; }
        .med-time { color: var(--text-tertiary); font-size: 13px; display: flex; align-items: center; gap: 4px; }
        .med-time svg { width: 12px; height: 12px; }
        .med-tag { font-size: 10px; padding: 2px 8px; border-radius: var(--radius-full); background: var(--bg-surface-hover); color: var(--text-tertiary); }

        .med-check {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-green-dim);
            color: var(--accent-green);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .med-check svg { width: 18px; height: 18px; }

        .med-btn {
            padding: 10px 18px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            border: 2px solid var(--accent-green);
            background: transparent;
            color: var(--accent-green);
            flex-shrink: 0;
        }
        .med-btn:hover { background: var(--accent-green); color: var(--bg-primary); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
        }
        .empty-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: var(--bg-surface);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
        }
        .empty-icon svg { width: 32px; height: 32px; }
        .empty-title { font-family: 'Instrument Serif', serif; font-size: 18px; margin-bottom: 6px; }
        .empty-text { color: var(--text-tertiary); font-size: 14px; }

        /* List Item */
        .list-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s ease;
        }
        .list-item:hover { background: var(--bg-surface-hover); }
        .list-item-info { flex: 1; min-width: 0; }
        .list-item-title { font-weight: 600; font-size: 16px; }
        .list-item-sub { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }
        .list-item-chips { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .chip { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-full); background: var(--bg-surface-hover); color: var(--text-secondary); }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 10px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }
        .icon-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
        .icon-btn svg { width: 20px; height: 20px; }

        /* Contact Card */
        .contact-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }
        .contact-card:hover { background: var(--bg-surface-hover); }
        .contact-role { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px; }
        .contact-name { font-size: 18px; font-weight: 600; }
        .contact-phone { color: var(--text-secondary); margin-top: 2px; font-size: 15px; }
        .contact-actions { display: flex; gap: 10px; margin-top: 16px; }
        .contact-btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .contact-btn.call { background: var(--accent-green); border: none; color: var(--bg-primary); }
        .contact-btn.call:hover { background: #8ec4a5; }
        .contact-btn.edit { background: transparent; border: 1px solid var(--border-medium); color: var(--text-secondary); }
        .contact-btn.edit:hover { background: var(--bg-surface-hover); }
        .contact-btn svg { width: 18px; height: 18px; }

        /* Chart */
        .chart-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .chart-title { font-size: 14px; color: var(--text-secondary); }
        .chart-legend { display: flex; gap: 12px; font-size: 10px; color: var(--text-tertiary); }
        .legend-dot { width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; display: inline-block; }
        .bar-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 100px; gap: 6px; }
        .bar-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .bar { width: 100%; max-width: 28px; border-radius: 4px 4px 0 0; transition: height 0.5s ease; }
        .bar-label { font-size: 10px; color: var(--text-tertiary); }

        /* History */
        .history-list {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .history-header { padding: 14px 16px; border-bottom: 1px solid var(--border-subtle); font-size: 14px; color: var(--text-secondary); font-weight: 500; }
        .history-item { padding: 14px 16px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 12px; }
        .history-item:last-child { border-bottom: none; }
        .history-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .history-icon.taken { background: var(--accent-green-dim); color: var(--accent-green); }
        .history-icon.missed { background: var(--accent-rose-dim); color: var(--accent-rose); }
        .history-icon svg { width: 16px; height: 16px; }
        .history-info { flex: 1; }
        .history-name { font-size: 14px; font-weight: 500; }
        .history-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
        .history-date { font-size: 12px; color: var(--text-tertiary); flex-shrink: 0; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10,15,30,0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            font-size: 10px;
            cursor: pointer;
            padding: 8px 24px;
            position: relative;
            font-family: inherit;
            transition: color 0.2s ease;
            min-width: 64px;
        }

        .nav-btn svg { width: 26px; height: 26px; transition: transform 0.2s ease; }
        .nav-btn.active { color: var(--text-primary); }
        .nav-btn.active svg { transform: scale(1.1); }

        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: var(--accent-green);
            border-radius: 2px;
            transition: width 0.2s ease;
        }

        .nav-btn.active::after { width: 20px; }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 96px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-green);
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(126,184,154,0.35);
            transition: all 0.2s ease;
        }
        .fab:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(126,184,154,0.45); }
        .fab:active { transform: scale(0.95); }
        .fab svg { width: 26px; height: 26px; }

        /* Bottom Sheet */

            return icons[name] || null;

        // Three.js - Soft Glowing Orbs
        function ThreeBackground() {
            const canvasRef = useRef(null);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const orbs = [];
                const colors = [0xffffff, 0x7eb89a, 0x7aa3c8, 0x9b8dc4];
                
                for (let i = 0; i < 45; i++) {
                    const size = 2 + Math.random() * 3;
                    const geometry = new THREE.SphereGeometry(size, 16, 16);
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const opacity = 0.15 + Math.random() * 0.15;
                    
                    const material = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
                    
                    const orb = new THREE.Mesh(geometry, material);
                    orb.position.set((Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 15);
                    orb.userData.vel = { x: (Math.random() - 0.5) * 0.002, y: (Math.random() - 0.5) * 0.002 };
                    scene.add(orb);
                    orbs.push(orb);

                    const glowGeom = new THREE.SphereGeometry(size * 2.5, 16, 16);
                    const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: opacity * 0.3 });
                    const glow = new THREE.Mesh(glowGeom, glowMat);
                    glow.position.copy(orb.position);
                    glow.userData.vel = orb.userData.vel;
                    scene.add(glow);
                    orbs.push(glow);
                }

                camera.position.z = 20;
                let animating = true;

                const animate = () => {
                    if (!animating) return;
                    requestAnimationFrame(animate);
                    for (let i = 0; i < orbs.length; i += 2) {
                        const orb = orbs[i];
                        orb.position.x += orb.userData.vel.x;
                        orb.position.y += orb.userData.vel.y;
                        orbs[i + 1].position.copy(orb.position);
                        if (Math.abs(orb.position.x) > 25) orb.userData.vel.x *= -1;
                        if (Math.abs(orb.position.y) > 25) orb.userData.vel.y *= -1;
                    }
                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    animating = false;
                    window.removeEventListener('resize', handleResize);
                    renderer.dispose();
                };
            }, []);

            return <canvas ref={canvasRef} id="three-bg" />;
        }

        // Helpers
        const getToday = () => new Date().toISOString().split('T')[0];
        const formatDate = () => new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        const getTimeOfDay = (h) => {
            if (h >= 5 && h < 12) return 'morning';
            if (h >= 12 && h < 17) return 'afternoon';
            if (h >= 17 && h < 21) return 'evening';
            return 'night';
        };
        const getTimeIcon = (h) => {
            if (h >= 5 && h < 12) return 'sun';
            if (h >= 12 && h < 17) return 'sun';
            if (h >= 17 && h < 21) return 'sunset';
            return 'moon';
        };
        const formatTime = (t) => {
            const [h, m] = t.split(':');
            const hour = parseInt(h);
            return `${hour % 12 || 12}:${m} ${hour >= 12 ? 'PM' : 'AM'}`;
        };

        const storage = {
            get: (k, d) => { try { const v = localStorage.getItem(`mm_${k}`); return v ? JSON.parse(v) : d; } catch { return d; } },

        };

        // AI Client
        const aiClient = {
            async chat(apiKey, messages) {
                const response = await fetch('https://api.hypereal.cloud/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'kimi-k2.5',
                        messages,
                        max_tokens: 1000,
                        temperature: 0.7
                    })
                });
                
                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error);
                }
                
                const data = await response.json();
                return data.choices[0].message.content;
            }
        };

        // System prompt for medication assistant
        const SYSTEM_PROMPT = `You are MedMinder AI, a helpful medication assistant. You help users manage their medications through natural conversation.

When a user wants to add a medication, respond with JSON in this format:
{"action": "add_med", "name": "Medication Name", "dosage": "dosage", "times": ["HH:MM"], "color": "blue|green|amber|rose|purple|teal", "food": "none|with|empty"}

When checking for drug interactions, respond with JSON:
{"action": "interaction_check", "medications": ["list of medications"], "concern": true|false, "message": "explanation"}

When providing advice or motivation, respond naturally.

Current medications: {meds}

Keep responses friendly, warm, and helpful.`;

        // Main App
        function App() {

            const [toast, setToast] = useState(null);

            const [apiKey, setApiKey] = useState(() => storage.get('apiKey', 'ck_47da0216d12dc4b87e08c5d21c452ffbc27fc904ec18c931eac0195239420211'));
            const [aiTyping, setAiTyping] = useState(false);
            const [aiResponse, setAiResponse] = useState(null);
            const [aiInput, setAiInput] = useState('');
            const undoTimer = useRef(null);

            useEffect(() => {
                setMeds(storage.get('meds', []));
                setTaken(storage.get('taken', {}));
                setHistory(storage.get('history', []));
                setContacts(storage.get('contacts', { family: {}, doctor: {}, pharmacy: {} }));
            }, []);

            useEffect(() => { storage.set('meds', meds); }, [meds]);
            useEffect(() => { storage.set('taken', taken); }, [taken]);
            useEffect(() => { storage.set('history', history); }, [history]);
            useEffect(() => { storage.set('contacts', contacts); }, [contacts]);
            useEffect(() => { storage.set('apiKey', apiKey); }, [apiKey]);
            
            // Initialize API key if not set
            useEffect(() => {
                const saved = storage.get('apiKey', '');
                if (!saved) {
                    storage.set('apiKey', 'ck_47da0216d12dc4b87e08c5d21c452ffbc27fc904ec18c931eac0195239420211');
                }
            }, []);

            const markTaken = useCallback((medId, time) => {
                const key = `${medId}-${time}`;
                const today = getToday();
                setTaken(prev => ({ ...prev, [today]: { ...(prev[today] || {}), [key]: true } }));
                const med = meds.find(m => m.id === medId);
                if (med) {
                    setHistory(prev => [{ id: Date.now(), name: med.name, time, date: today, action: 'taken' }, ...prev].slice(0, 100));
                }
                clearTimeout(undoTimer.current);
                setToast(`${med?.name} marked as taken`);
                setUndoKey(key);
                undoTimer.current = setTimeout(() => { setToast(null); setUndoKey(null); }, 5000);
            }, [meds]);

            const undoTaken = useCallback(() => {
                const today = getToday();
                setTaken(prev => {
                    const day = { ...(prev[today] || {}) };
                    delete day[undoKey];
                    return { ...prev, [today]: day };
                });
                setHistory(prev => prev.filter(h => !(h.date === today)));
                setToast(null);
                setUndoKey(null);
            }, [undoKey]);

            const deleteMed = useCallback((id) => {
                if (confirm('Remove this medication?')) setMeds(prev => prev.filter(m => m.id !== id));
            }, []);

            // AI Chat
            const handleAiSend = async () => {
                if (!aiInput.trim() || !apiKey || aiTyping) return;
                
                setAiTyping(true);
                const userMessage = aiInput.trim();
                setAiInput('');
                
                try {
                    const medsList = meds.map(m => `${m.name} ${m.dosage || ''}`).join(', ') || 'No medications added yet';
                    const systemPrompt = SYSTEM_PROMPT.replace('{meds}', medsList);
                    
                    const response = await aiClient.chat(apiKey, [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userMessage }
                    ]);
                    
                    setAiResponse({
                        text: response,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                    
                    // Try to parse action from response
                    try {
                        const jsonMatch = response.match(/\{[\s\S]*?\}/);
                        if (jsonMatch) {
                            const action = JSON.parse(jsonMatch[0]);
                            if (action.action === 'add_med') {
                                const newMed = {
                                    id: Date.now().toString(),
                                    name: action.name,
                                    dosage: action.dosage || '',
                                    times: action.times || ['08:00'],
                                    color: action.color || 'blue',
                                    food: action.food || 'none',
                                    notes: ''
                                };
                                setMeds(prev => [...prev, newMed]);
                                setAiResponse({
                                    text: `I've added ${action.name} to your medications. You can edit it anytime in the Meds tab!`,
                                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                                });
                            }
                        }
                    } catch (e) {
                        // Not JSON, just show response
                    }
                } catch (error) {
                    setAiResponse({
                        text: `Sorry, I couldn't connect to the AI. Please check your API key.`,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                }
                
                setAiTyping(false);
            };

            // Stats
            const today = getToday();
            const allDoses = useMemo(() => meds.flatMap(m => m.times.map(t => ({ ...m, currentTime: t }))), [meds]);
            const takenToday = Object.keys(taken[today] || {}).length;
            const totalToday = allDoses.length;
            const percent = totalToday > 0 ? Math.round((takenToday / totalToday) * 100) : 0;

            const streak = useMemo(() => {
                let s = 0;
                for (let i = 0; i < 365; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    const total = meds.flatMap(m => m.times).length;
                    const done = Object.keys(taken[ds] || {}).length;
                    if (total > 0 && done >= total) s++;
                    else if (total > 0) break;
                }
                return s;
            }, [taken, meds]);

            const weeklyRate = useMemo(() => {
                let total = 0, done = 0;
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    total += meds.flatMap(m => m.times).length;
                    done += Object.keys(taken[ds] || {}).length;
                }
                return total > 0 ? Math.round((done / total) * 100) : 0;
            }, [taken, meds]);

            const getWeeklyData = useMemo(() => {
                const days = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    const total = meds.flatMap(m => m.times).length;
                    const done = Object.keys(taken[ds] || {}).length;
                    days.push({
                        label: d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 2),
                        rate: total > 0 ? Math.round((done / total) * 100) : 0
                    });
                }
                return days;
            }, [taken, meds]);

            const groupMeds = useMemo(() => {
                const groups = { morning: [], afternoon: [], evening: [], night: [] };
                meds.forEach(m => {
                    m.times.forEach(t => {
                        const h = parseInt(t.split(':')[0]);
                        groups[getTimeOfDay(h)].push({ ...m, currentTime: t });
                    });
                });
                return groups;
            }, [meds]);

            const getProgressClass = () => {
                if (percent >= 80) return '';
                if (percent >= 50) return 'low';
                return 'critical';
            };

            const getProgressMsg = () => {
                if (totalToday === 0) return 'Add medications to track';
                if (percent === 100) return 'All done for today';
                if (percent >= 80) return 'Almost there';
                if (percent >= 50) return 'Keep going';
                if (takenToday > 0) return 'Good start';
                return 'Start your day';
            };

            // Render pages
            const renderHome = () => (
                <div className="page" key="home">
                    <div className="page-header">
                        <h1 className="page-title">{formatDate()}</h1>
                        <p className="page-subtitle">{takenToday} of {totalToday} medications taken</p>
                    </div>

                    {/* AI Chat Input */}
                    <div className="ai-input-container">
                        <div className="ai-input-header">
                            <Icon name="sparkles" size={16} />
                            Ask MedMinder AI
                        </div>
                        <div className="ai-input-row">
                            <textarea
                                className="ai-input"
                                placeholder="Add my evening vitamins, or ask anything..."
                                value={aiInput}
                                onChange={(e) => setAiInput(e.target.value)}
                                onKeyDown={(e) => {
                                    if (e.key === 'Enter' && !e.shiftKey) {
                                        e.preventDefault();
                                        handleAiSend();
                                    }
                                }}
                                rows={1}
                            />
                            <button className="ai-send-btn" onClick={handleAiSend} disabled={!apiKey || aiTyping}>
                                <Icon name="send" size={20} />
                            </button>
                        </div>
                        {!apiKey && (
                            <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 8 }}>
                                Add your API key in Settings to enable AI
                            </div>
                        )}
                    </div>

                    {aiTyping && (
                        <div className="ai-typing">
                            <span className="ai-dot"></span>
                            <span className="ai-dot"></span>
                            <span className="ai-dot"></span>
                            Thinking...
                        </div>
                    )}

                    {aiResponse && !aiTyping && (
                        <div className="ai-response">
                            <div className="ai-response-header">
                                <div className="ai-response-label">
                                    <Icon name="robot" size={16} />
                                    MedMinder AI
                                </div>
                                <div className="ai-response-time">{aiResponse.time}</div>
                            </div>
                            <div className="ai-response-content">{aiResponse.text}</div>
                        </div>
                    )}

                    <div className="progress-card">
                        <div className="progress-row">
                            <div className="progress-ring-wrap">
                                <svg className="progress-ring" width="90" height="90">
                                    <circle className="progress-ring-bg" cx="45" cy="45" r="38" />
                                    <circle
                                        className={`progress-ring-fill ${getProgressClass()}`}
                                        cx="45" cy="45" r="38"
                                        strokeDasharray={`${2 * Math.PI * 38}`}
                                        strokeDashoffset={`${2 * Math.PI * 38 * (1 - percent / 100)}`}
                                    />
                                </svg>
                                <div className="progress-center">
                                    <div className="progress-percent">{percent}%</div>
                                    <div className="progress-label">Today</div>
                                </div>
                            </div>
                            <div className="progress-info">
                                <div className="progress-done">{takenToday} <span>of {totalToday}</span></div>
                                <p className="progress-msg">{getProgressMsg()}</p>
                            </div>
                        </div>
                    </div>

                    {Object.entries(groupMeds).map(([period, items]) => 
                        items.length > 0 && (
                            <div className="med-section" key={period}>
                                <div className="med-section-title">
                                    <Icon name={getTimeIcon(parseInt(items[0]?.currentTime?.split(':')[0] || 12))} size={14} />
                                    {period}
                                </div>
                                {items.map(med => {
                                    const key = `${med.id}-${med.currentTime}`;
                                    const isTaken = taken[today]?.[key];
                                    return (
                                        <div className={`med-card ${isTaken ? 'done' : ''}`} data-color={med.color || 'blue'} key={key}>
                                            <div className="med-color-bar" style={{ background: `var(--accent-${med.color || 'blue'})` }} />
                                            <div className="med-info">
                                                <div className="med-name">{med.name}</div>
                                                <div className="med-meta">
                                                    <span className="med-dosage">{med.dosage}</span>
                                                    <span className="med-time">
                                                        <Icon name="clock" size={12} />
                                                        {formatTime(med.currentTime)}
                                                    </span>
                                                </div>
                                            </div>
                                            {isTaken ? (
                                                <div className="med-check"><Icon name="check" size={18} /></div>
                                            ) : (
                                                <button className="med-btn" onClick={() => markTaken(med.id, med.currentTime)}>Take</button>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    )}

                    {meds.length === 0 && (
                        <div className="empty-state">
                            <div className="empty-icon"><Icon name="pill" size={32} /></div>
                            <h3 className="empty-title">No medications yet</h3>
                            <p className="empty-text">Ask AI to add them, or tap the + button</p>
                        </div>
                    )}
                </div>
            );

            const renderMeds = () => (
                <div className="page" key="meds">
                    <div className="page-header">
                        <h1 className="page-title">Medications</h1>
                        <p className="page-subtitle">{meds.length} tracked</p>
                    </div>

                    {meds.length === 0 ? (
                        <div className="empty-state">
                            <div className="empty-icon"><Icon name="pill" size={32} /></div>
                            <h3 className="empty-title">No medications</h3>
                            <p className="empty-text">Add medications to start tracking</p>
                        </div>
                    ) : (
                        meds.map(med => (
                            <div className="list-item" key={med.id}>
                                <div style={{ width: 6, height: 44, borderRadius: 3, background: `var(--accent-${med.color || 'blue'})`, flexShrink: 0 }} />
                                <div className="list-item-info">
                                    <div className="list-item-title">{med.name}</div>
                                    <div className="list-item-sub">{med.dosage}</div>
                                    <div className="list-item-chips">
                                        {med.times.map(t => <span className="chip" key={t}>{formatTime(t)}</span>)}
                                        {med.food !== 'none' && <span className="chip">{med.food === 'with' ? 'With food' : 'Empty'}</span>}
                                    </div>
                                </div>
                                <button className="icon-btn" onClick={() => setSheet({ type: 'edit', med })}>
                                    <Icon name="edit" />
                                </button>
                            </div>
                        ))
                    )}
                </div>
            );

            const renderProgress = () => (
                <div className="page" key="progress">
                    <div className="page-header">
                        <h1 className="page-title">Progress</h1>
                        <p className="page-subtitle">Your medication adherence</p>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-icon flame"><Icon name="flame" /></div>
                            <div className="stat-value">{streak}</div>
                            <div className="stat-label">Day Streak</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon rate"><Icon name="percent" /></div>
                            <div className="stat-value">{weeklyRate}%</div>
                            <div className="stat-label">This Week</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon total"><Icon name="check" /></div>
                            <div className="stat-value">{history.length}</div>
                            <div className="stat-label">Total Taken</div>
                        </div>
                    </div>

                    <div className="chart-card">
                        <div className="chart-header">
                            <span className="chart-title">Weekly Overview</span>
                            <div className="chart-legend">
                                <span><span className="legend-dot" style={{ background: 'var(--accent-green)' }} />80%+</span>
                                <span><span className="legend-dot" style={{ background: 'var(--accent-amber)' }} />60-80%</span>
                                <span><span className="legend-dot" style={{ background: 'var(--accent-rose)' }} />Below</span>
                            </div>
                        </div>
                        <div className="bar-chart">
                            {getWeeklyData.map((d, i) => (
                                <div className="bar-day" key={i}>
                                    <div className="bar" style={{
                                        height: `${Math.max(d.rate, 4)}%`,
                                        background: d.rate >= 80 ? 'var(--accent-green)' : d.rate >= 60 ? 'var(--accent-amber)' : 'var(--accent-rose)'
                                    }} />
                                    <div className="bar-label">{d.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="history-list">
                        <div className="history-header">Recent History</div>
                        {history.slice(0, 20).map(h => (
                            <div className="history-item" key={h.id}>
                                <div className={`history-icon ${h.action}`}>
                                    <Icon name={h.action === 'taken' ? 'check' : 'x'} />
                                </div>
                                <div className="history-info">
                                    <div className="history-name">{h.name}</div>
                                    <div className="history-meta">{formatTime(h.time)}</div>
                                </div>
                                <div className="history-date">{new Date(h.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                            </div>
                        ))}
                        {history.length === 0 && (
                            <div className="empty-state" style={{ padding: 32 }}>
                                <p className="empty-text">No history yet</p>
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderContacts = () => (
                <div className="page" key="contacts">
                    <div className="page-header">
                        <h1 className="page-title">Contacts</h1>
                        <p className="page-subtitle">Emergency contacts</p>
                    </div>

                    {['family', 'doctor', 'pharmacy'].map(role => (
                        <div className="contact-card" key={role}>
                            <div className="contact-role">{role}</div>
                            <div className="contact-name">{contacts[role]?.name || 'Not set'}</div>
                            <div className="contact-phone">{contacts[role]?.phone || 'Tap edit to add'}</div>
                            <div className="contact-actions">
                                <button className="contact-btn call" onClick={() => {
                                    const phone = contacts[role]?.phone;
                                    if (phone) window.location.href = `tel:${phone.replace(/\D/g, '')}`;
                                }}>
                                    <Icon name="phone" size={18} /> Call
                                </button>
                                <button className="contact-btn edit" onClick={() => setSheet({ type: 'contact', role })}>
                                    <Icon name="edit" size={18} /> Edit
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="app">
                    <ThreeBackground />
                    
                    <header className="header">
                        <div className="header-left">
                            <div className="logo-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
                                    <path d="m8.5 8.5 7 7"/>
                                </svg>
                            </div>
                            <span className="logo-text">MedMinder</span>
                        </div>
                        <button className="header-btn" onClick={() => setSheet({ type: 'settings' })}>
                            <Icon name="settings" />
                        </button>
                    </header>

                    <main className="content">
                        {page === 'home' && renderHome()}
                        {page === 'meds' && renderMeds()}
                        {page === 'progress' && renderProgress()}
                        {page === 'contacts' && renderContacts()}
                    </main>

                    <nav className="bottom-nav">
                        <button className={`nav-btn ${page === 'home' ? 'active' : ''}`} onClick={() => setPage('home')}>
                            <Icon name="home" />
                            Home
                        </button>
                        <button className={`nav-btn ${page === 'meds' ? 'active' : ''}`} onClick={() => setPage('meds')}>
                            <Icon name="pill" />
                            Meds
                        </button>
                        <button className={`nav-btn ${page === 'progress' ? 'active' : ''}`} onClick={() => setPage('progress')}>
                            <Icon name="chart" />
                            Progress
                        </button>
                        <button className={`nav-btn ${page === 'contacts' ? 'active' : ''}`} onClick={() => setPage('contacts')}>
                            <Icon name="phone" />
                            Contacts
                        </button>
                    </nav>

                    <button className="fab" onClick={() => setSheet({ type: 'add' })}>
                        <Icon name="plus" />
                    </button>

                    <div className={`sheet-overlay ${sheet ? 'active' : ''}`} onClick={() => setSheet(null)} />
                    <div className={`bottom-sheet ${sheet ? 'active' : ''}`}>
                        <div className="sheet-handle" />
                        <h3 className="sheet-title">
                            {sheet?.type === 'add' ? 'Add Medication' : 
                             sheet?.type === 'edit' ? 'Edit Medication' : 
                             sheet?.type === 'contact' ? 'Edit Contact' :
                             sheet?.type === 'settings' ? 'Settings' : ''}
                        </h3>
                        
                        {sheet?.type === 'settings' && (
                            <div className="settings-section">
                                <div className="settings-title">
                                    <Icon name="sparkles" size={18} />
                                    AI Settings
                                </div>
                                <div className="api-provider">Provider: Hypereal (Kimi K2.5)</div>
                                <input
                                    type="password"
                                    className="api-key-input"
                                    placeholder="Enter your API key..."
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                                <div className="api-status">
                                    <span className={`api-status-dot ${apiKey ? 'connected' : 'disconnected'}`}></span>
                                    {apiKey ? 'API key configured' : 'No API key configured'}
                                </div>
                                <p style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 12 }}>
                                    Get your free API key at hypereal.ai with 35 free credits
                                </p>
                            </div>
                        )}
                        
                        {(sheet?.type === 'add' || sheet?.type === 'edit') && (
                            <MedForm
                                med={sheet?.type === 'edit' ? sheet.med : null}
                                onSave={(data) => {
                                    if (sheet?.type === 'edit') setMeds(prev => prev.map(m => m.id === sheet.med.id ? { ...m, ...data } : m));
                                    else setMeds(prev => [...prev, { ...data, id: Date.now().toString() }]);
                                    setSheet(null);
                                }}
                                onDelete={sheet?.type === 'edit' ? () => { deleteMed(sheet.med.id); setSheet(null); } : null}
                            />
                        )}
                        
                        {sheet?.type === 'contact' && (
                            <ContactForm
                                data={contacts[sheet.role]}
                                onSave={(data) => { setContacts(prev => ({ ...prev, [sheet.role]: data })); setSheet(null); }}
                                onCancel={() => setSheet(null)}
                            />
                        )}
                    </div>

                    <div className={`toast ${toast ? 'show' : ''}`}>
                        <span className="toast-msg">{toast}</span>
                        <button className="toast-undo" onClick={undoTaken}>Undo</button>
                    </div>
                </div>
            );
        }

        // Med Form
        function MedForm({ med, onSave, onDelete }) {
            const [form, setForm] = useState({
                name: med?.name || '',
                dosage: med?.dosage || '',
                color: med?.color || 'blue',
                times: med?.times || ['08:00'],
                food: med?.food || 'none',
                notes: med?.notes || ''
            });

            return (
                <form onSubmit={(e) => { e.preventDefault(); onSave(form); }}>
                    <div className="form-group">
                        <label className="form-label">Name</label>
                        <input className="form-input" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Medication name" required />
                    </div>

                    <div className="form-row">
                        <div className="form-group">
                            <label className="form-label">Dosage</label>
                            <input className="form-input" value={form.dosage} onChange={e => setForm(f => ({ ...f, dosage: e.target.value }))} placeholder="e.g., 100mg" />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Color</label>
                            <div className="color-swatches">
                                {['blue', 'green', 'amber', 'rose', 'purple', 'teal'].map(c => (
                                    <div key={c} className={`swatch swatch-${c} ${form.color === c ? 'selected' : ''}`} onClick={() => setForm(f => ({ ...f, color: c }))} />
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="form-group">
                        <label className="form-label">Times</label>
                        <div className="times-list">
                            {form.times.map((t, i) => (
                                <div className="time-row" key={i}>
                                    <input type="time" value={t} onChange={e => {
                                        const times = [...form.times];
                                        times[i] = e.target.value;
                                        setForm(f => ({ ...f, times }));
                                    }} />
                                    {form.times.length > 1 && (
                                        <button type="button" className="icon-btn" onClick={() => setForm(f => ({ ...f, times: f.times.filter((_, j) => j !== i) }))}>
                                            <Icon name="x" size={16} />
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                        {form.times.length < 6 && (
                            <button type="button" className="add-btn" onClick={() => setForm(f => ({ ...f, times: [...f.times, '12:00'] }))}>
                                <Icon name="plus" size={16} /> Add time
                            </button>
                        )}
                    </div>

                    <div className="form-group">
                        <label className="form-label">Take with food</label>
                        <div className="food-btns">
                            {[['none', 'Any'], ['with', 'With food'], ['empty', 'Empty stomach']].map(([v, l]) => (
                                <button key={v} type="button" className={`food-btn ${form.food === v ? 'selected' : ''}`} onClick={() => setForm(f => ({ ...f, food: v }))}>{l}</button>
                            ))}
                        </div>
                    </div>

                    <div className="form-group">
                        <label className="form-label">Notes</label>
                        <textarea className="form-input" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Optional notes..." />
                    </div>

                    <button type="submit" className="btn btn-primary">{med ? 'Save Changes' : 'Add Medication'}</button>
                    {onDelete && <button type="button" className="btn btn-danger" onClick={onDelete}><Icon name="trash" size={18} /> Delete Medication</button>}
                </form>
            );
        }

        // Contact Form
        function ContactForm({ data, onSave, onCancel }) {
            const [name, setName] = useState(data?.name || '');
            const [phone, setPhone] = useState(data?.phone || '');
            
            return (
                <form onSubmit={(e) => { e.preventDefault(); onSave({ name, phone }); }}>
                    <div className="form-group">
                        <label className="form-label">Name</label>
                        <input className="form-input" value={name} onChange={e => setName(e.target.value)} placeholder="Contact name" />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Phone</label>
                        <input className="form-input" type="tel" value={phone} onChange={e => setPhone(e.target.value)} placeholder="Phone number" />
                    </div>
                    <div style={{ display: 'flex', gap: 12 }}>
                        <button type="button" className="btn btn-outline" onClick={onCancel} style={{ flex: 1 }}>Cancel</button>
                        <button type="submit" className="btn btn-primary" style={{ flex: 1 }}>Save</button>
                    </div>
                </form>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
